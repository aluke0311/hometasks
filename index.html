<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<title>Home Tasks</title>
<style>
  :root {
    --bg: #fafaf8; --bg2: #f1efe8; --bg3: #e8e6df;
    --card: #ffffff; --border: rgba(0,0,0,0.1); --border2: rgba(0,0,0,0.18);
    --text: #2c2c2a; --text2: #5f5e5a; --text3: #888780;
    --red: #e24b4a; --red-bg: #fcebeb;
    --amber: #ba7517; --amber-bg: #faeeda;
    --green: #3b6d11; --green-bg: #eaf3de;
    --blue: #185fa5; --blue-bg: #e6f1fb;
    --radius: 10px; --radius-sm: 6px;
    --safe-top: env(safe-area-inset-top);
    --safe-bottom: env(safe-area-inset-bottom);
    --nav-height: 49px;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #1a1a18; --bg2: #222220; --bg3: #2c2c2a;
      --card: #252523; --border: rgba(255,255,255,0.1); --border2: rgba(255,255,255,0.18);
      --text: #f1efe8; --text2: #b4b2a9; --text3: #888780;
      --red-bg: #3d1a1a; --amber-bg: #2e1f08; --green-bg: #1a2e0a; --blue-bg: #0c2240;
    }
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  input, select, textarea { -webkit-appearance: none; appearance: none; border-radius: var(--radius-sm); }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); font-size: 15px; line-height: 1.5; -webkit-text-size-adjust: 100%; }
  .app { max-width: 100%; min-height: 100vh; padding-bottom: calc(var(--nav-height) + var(--safe-bottom)); }

  .header { padding: env(safe-area-inset-top) 24px 0; border-bottom: 0.5px solid var(--border); background: var(--card); position: sticky; top: 0; z-index: 100; }
  .header-inner { display: flex; justify-content: space-between; align-items: center; height: 52px; }
  .header-logo { display: flex; align-items: center; gap: 8px; }
  .header-logo-icon { width: 28px; height: 28px; background: var(--green); border-radius: 6px; display: flex; align-items: center; justify-content: center; color: white; font-size: 15px; flex-shrink: 0; }
  .header-logo-text { font-size: 16px; font-weight: 500; color: var(--text); }
  @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.3; } }

  .tab-row { display: none; }
  .bottom-nav { position: fixed; bottom: 0; left: 0; right: 0; height: calc(var(--nav-height) + var(--safe-bottom)); padding-bottom: var(--safe-bottom); background: var(--card); border-top: 0.5px solid var(--border); display: flex; z-index: 100; backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); }
  .tab { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 3px; border: none; background: transparent; color: var(--text3); cursor: pointer; padding: 6px 2px 4px; min-height: var(--nav-height); transition: color 0.15s; }
  .tab.active { color: var(--green); }
  .tab-icon { font-size: 20px; line-height: 1; }
  .tab-label { font-size: 10px; font-weight: 500; letter-spacing: 0.01em; }

  /* Hero header (Alina view) */
  .view-hero { padding: 20px 24px 16px; border-bottom: 0.5px solid var(--border); display: flex; align-items: flex-end; justify-content: space-between; }
  .view-hero-left { }
  .view-hero-title { font-size: 28px; font-weight: 600; line-height: 1.2; }
  .view-hero-subtitle { font-size: 14px; color: var(--text3); margin-top: 2px; }

  /* Stats row */
  .stats-row { padding: 10px 24px; border-bottom: 0.5px solid var(--border); background: var(--bg2); }
  .stats-row-top { display: flex; align-items: center; gap: 10px; }
  .stat-badge { font-size: 12px; padding: 3px 10px; border-radius: 12px; background: var(--card); border: 0.5px solid var(--border2); color: var(--text2); white-space: nowrap; }
  .stats-zone { margin-left: auto; }
  .zone-select { border: 0.5px solid var(--border2); background: var(--card); color: var(--text2); font-size: 16px; padding: 3px 8px; border-radius: var(--radius-sm); max-width: 180px; }
  .stats-progress-wrap { height: 4px; background: var(--bg3); border-radius: 2px; overflow: hidden; margin-top: 8px; }
  .progress-bar { height: 100%; background: var(--green); border-radius: 2px; transition: width 0.3s; }

  /* Settings page cards */
  .settings-card { background: var(--card); border: 0.5px solid var(--border); border-radius: var(--radius); padding: 20px 24px; margin: 16px 24px 0; }
  .settings-card-title { font-size: 15px; font-weight: 600; margin-bottom: 4px; }
  .settings-card-desc { font-size: 13px; color: var(--text3); margin-bottom: 14px; }
  .settings-row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; }
  .settings-row:last-child { margin-bottom: 0; }
  .settings-label { font-size: 13px; color: var(--text2); }
  .settings-control { display: flex; align-items: center; gap: 8px; }
  .stepper-btn { width: 28px; height: 28px; border-radius: 50%; border: 0.5px solid var(--border2); background: var(--bg2); color: var(--text); font-size: 16px; cursor: pointer; display: flex; align-items: center; justify-content: center; }
  .stepper-val { font-size: 14px; font-weight: 500; min-width: 24px; text-align: center; }
  .settings-save-btn { font-size: 12px; padding: 4px 12px; border-radius: var(--radius-sm); border: 0.5px solid var(--green); background: transparent; color: var(--green); cursor: pointer; }
  .settings-summary { font-size: 12px; color: var(--text3); margin-top: 10px; }
  .settings-stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 4px; }
  .settings-stat-box { background: var(--bg2); border-radius: var(--radius-sm); padding: 12px 14px; }
  .settings-stat-num { font-size: 22px; font-weight: 600; }
  .settings-stat-label { font-size: 12px; color: var(--text3); }
  .zone-ref-table { width: 100%; border-collapse: collapse; font-size: 12px; margin-top: 10px; }
  .zone-ref-table th { text-align: left; color: var(--text3); font-weight: 500; padding: 4px 0; border-bottom: 0.5px solid var(--border); }
  .zone-ref-table td { padding: 5px 0; border-bottom: 0.5px solid var(--border); color: var(--text2); vertical-align: top; }
  .zone-ref-table td:first-child { font-weight: 500; color: var(--text); width: 70px; white-space: nowrap; padding-right: 12px; }

  .section { padding: 0 24px; margin-top: 16px; }
  .section-label { font-size: 11px; font-weight: 500; text-transform: uppercase; letter-spacing: 0.08em; color: var(--text3); margin-bottom: 8px; padding-left: 2px; display: flex; justify-content: space-between; align-items: center; }
  .section-label-time { font-weight: 400; font-size: 11px; color: var(--text3); letter-spacing: 0; text-transform: none; }

  .task-card { background: var(--card); border: 0.5px solid var(--border); border-radius: var(--radius); margin-bottom: 6px; overflow: hidden; }
  .task-card.done { opacity: 0.45; }
  .task-main { display: flex; align-items: center; padding: 14px 16px; gap: 12px; cursor: pointer; }
  .task-check { width: 24px; height: 24px; border-radius: 50%; border: 1.5px solid var(--border2); flex-shrink: 0; display: flex; align-items: center; justify-content: center; transition: all 0.15s; }
  .task-card.done .task-check { background: var(--green); border-color: var(--green); }
  .task-check-inner { width: 8px; height: 8px; border-right: 2px solid white; border-bottom: 2px solid white; transform: rotate(45deg) translate(-1px, -2px); display: none; }
  .task-card.done .task-check-inner { display: block; }
  .task-body { flex: 1; min-width: 0; }
  .task-name { font-size: 15px; font-weight: 500; color: var(--text); }
  .task-meta { display: flex; align-items: center; gap: 6px; margin-top: 3px; flex-wrap: wrap; }
  .task-room { font-size: 12px; color: var(--text3); }
  .task-dot { font-size: 10px; color: var(--border2); }
  .task-time { font-size: 12px; color: var(--text3); }
  .task-freq { font-size: 11px; color: var(--text3); background: var(--bg2); padding: 1px 6px; border-radius: 8px; }
  .task-overdue { font-size: 11px; padding: 1px 6px; border-radius: 10px; background: var(--red-bg); color: var(--red); font-weight: 500; }
  .task-notdue  { font-size: 11px; padding: 1px 6px; border-radius: 10px; background: var(--bg3); color: var(--text3); }

  .owner-badge { font-size: 11px; padding: 1px 6px; border-radius: 10px; font-weight: 500; }
  .owner-alina { background: var(--purple-bg, #eeedfe); color: var(--purple, #534ab7); }
  .owner-bob   { background: var(--teal-bg, #e1f5ee);   color: var(--teal, #0f6e56); }

  .task-detail { padding: 0 12px 4px 48px; }
  .task-lastdone { font-size: 12px; color: var(--text3); display: flex; align-items: center; gap: 6px; }
  .edit-btn { font-size: 11px; padding: 2px 7px; border-radius: var(--radius-sm); border: 0.5px solid var(--border2); background: transparent; color: var(--text3); cursor: pointer; }
  .edit-btn:hover { background: var(--bg2); }
  .date-picker-row { display: none; align-items: center; gap: 8px; margin-top: 4px; padding-bottom: 4px; }
  .date-picker-row.open { display: flex; }
  .date-input { border: 0.5px solid var(--border2); background: var(--card); color: var(--text); font-size: 12px; padding: 3px 7px; border-radius: var(--radius-sm); }
  .date-save-btn { font-size: 12px; padding: 3px 10px; border-radius: var(--radius-sm); border: 0.5px solid var(--green); background: transparent; color: var(--green); cursor: pointer; }

  .task-actions { display: flex; gap: 8px; padding: 0 12px 12px 48px; }
  .task-btn { font-size: 13px; padding: 8px 14px; border-radius: var(--radius-sm); border: 0.5px solid var(--border2); background: transparent; color: var(--text2); cursor: pointer; transition: background 0.12s; min-height: 36px; }
  .task-btn:active { background: var(--bg2); }
  .task-btn.swap-btn { color: var(--blue); border-color: var(--blue); }

  .more-btn { width: 100%; padding: 11px; border-radius: var(--radius); border: 0.5px dashed var(--border2); background: transparent; color: var(--text2); font-size: 13px; cursor: pointer; margin-bottom: 8px; transition: background 0.12s; }
  .more-btn:hover { background: var(--bg2); }

  .overflow-section { padding: 0 24px; margin-top: 8px; }
  .overflow-toggle { display: flex; align-items: center; gap: 6px; background: none; border: none; color: var(--text3); font-size: 12px; cursor: pointer; padding: 4px 2px; margin-bottom: 8px; }
  .overflow-toggle svg { transition: transform 0.2s; }
  .overflow-toggle.open svg { transform: rotate(90deg); }


  /* All Tasks (manage) tab */
  .manage-header { padding: 16px 24px 12px; display: flex; justify-content: space-between; align-items: center; border-bottom: 0.5px solid var(--border); }
  .manage-header-left { }
  .manage-title { font-size: 18px; font-weight: 600; }
  .manage-subtitle { font-size: 13px; color: var(--text3); margin-top: 2px; }
  .add-btn { font-size: 13px; padding: 7px 16px; border-radius: var(--radius-sm); border: none; background: var(--green); color: white; cursor: pointer; font-weight: 500; }
  .manage-toolbar { padding: 10px 24px; display: flex; gap: 8px; flex-wrap: wrap; border-bottom: 0.5px solid var(--border); background: var(--bg2); }
  .search-input { flex: 1; min-width: 100px; border: 0.5px solid var(--border2); background: var(--card); color: var(--text); font-size: 16px; padding: 8px 10px; border-radius: var(--radius-sm); }
  .filter-select { border: 0.5px solid var(--border2); background: var(--card); color: var(--text2); font-size: 16px; padding: 7px 8px; border-radius: var(--radius-sm); }
  .tasks-table { width: 100%; border-collapse: collapse; }
  .tasks-table th { text-align: left; font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.06em; color: var(--text3); padding: 10px 24px; border-bottom: 0.5px solid var(--border); background: var(--bg2); }
  .tasks-table td { padding: 10px 24px; border-bottom: 0.5px solid var(--border); font-size: 13px; color: var(--text2); vertical-align: middle; }
  .tasks-table td:first-child { color: var(--text); font-size: 14px; }
  .tasks-table tr:hover td { background: var(--bg2); }
  .status-due { font-size: 11px; padding: 2px 8px; border-radius: 10px; background: var(--red-bg); color: var(--red); font-weight: 600; }
  .status-ok { font-size: 11px; padding: 2px 8px; border-radius: 10px; background: var(--bg3); color: var(--text3); }
  .manage-row-actions { display: flex; gap: 4px; }
  .icon-btn { width: 28px; height: 28px; border-radius: var(--radius-sm); border: 0.5px solid var(--border2); background: transparent; color: var(--text2); cursor: pointer; font-size: 13px; display: flex; align-items: center; justify-content: center; }
  .icon-btn.danger { color: var(--red); border-color: var(--red); }
  /* Mobile manage cards */
  .manage-list { padding: 0 16px; margin-top: 8px; }
  .manage-card { background: var(--card); border: 0.5px solid var(--border); border-radius: var(--radius); margin-bottom: 6px; overflow: hidden; transition: opacity 0.15s; }
  .manage-card.mc-done { opacity: 0.5; }
  .manage-card-main { display: flex; align-items: flex-start; padding: 12px 12px 4px 12px; gap: 10px; }
  .mc-check { width: 28px; height: 28px; border-radius: 50%; border: 1.5px solid var(--border2); flex-shrink: 0; display: flex; align-items: center; justify-content: center; background: transparent; cursor: pointer; margin-top: 1px; }
  .manage-card.mc-done .mc-check { background: var(--green); border-color: var(--green); }
  .mc-check-inner { width: 8px; height: 8px; border-right: 2px solid white; border-bottom: 2px solid white; transform: rotate(45deg) translate(-1px,-2px); display: none; }
  .manage-card.mc-done .mc-check-inner { display: block; }
  .manage-card-body { flex: 1; min-width: 0; }
  .manage-card-name { font-size: 15px; font-weight: 500; color: var(--text); line-height: 1.3; }
  .manage-card-meta { font-size: 12px; color: var(--text3); margin-top: 3px; display: flex; flex-wrap: wrap; gap: 4px; align-items: center; }
  .manage-card-icons { display: flex; gap: 6px; flex-shrink: 0; margin-top: 2px; }
  .manage-card-foot { display: flex; align-items: center; gap: 8px; padding: 6px 12px 10px 50px; }
  .manage-card-last { font-size: 12px; color: var(--text3); flex: 1; }
  .manage-hand-btn { font-size: 12px; padding: 5px 12px; border-radius: var(--radius-sm); border: 0.5px solid var(--border2); background: transparent; color: var(--text2); cursor: pointer; white-space: nowrap; min-height: 32px; }
  .manage-hand-btn.in-hand { border-color: var(--green); color: var(--green); background: var(--green-bg); }
  .manage-dp-row { display: none; align-items: center; gap: 8px; padding: 0 12px 10px 50px; }
  .manage-dp-row.open { display: flex; }
  /* Modal — bottom sheet */
  .modal-backdrop { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.45); z-index: 200; align-items: flex-end; justify-content: center; padding: 0; }
  .modal-backdrop.open { display: flex; }
  .modal { background: var(--card); border-radius: 16px 16px 0 0; width: 100%; max-width: 100%; overflow: hidden; padding-bottom: env(safe-area-inset-bottom); max-height: 92vh; display: flex; flex-direction: column; }
  .modal-header { padding: 16px 20px; border-bottom: 0.5px solid var(--border); display: flex; justify-content: space-between; align-items: center; flex-shrink: 0; }
  .modal-title { font-size: 17px; font-weight: 600; }
  .modal-close { background: none; border: none; font-size: 20px; color: var(--text2); cursor: pointer; padding: 4px 8px; min-width: 44px; min-height: 44px; display: flex; align-items: center; justify-content: center; }
  .modal-body { padding: 16px 20px; display: flex; flex-direction: column; gap: 14px; overflow-y: auto; -webkit-overflow-scrolling: touch; flex: 1; }
  .field-label { font-size: 13px; color: var(--text3); margin-bottom: 5px; }
  .field-input { width: 100%; border: 0.5px solid var(--border2); background: var(--card); color: var(--text); font-size: 16px; padding: 10px 12px; border-radius: var(--radius-sm); }
  .field-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .field-select { width: 100%; border: 0.5px solid var(--border2); background: var(--card); color: var(--text); font-size: 16px; padding: 10px 12px; border-radius: var(--radius-sm); }
  .field-check-row { display: flex; align-items: center; gap: 10px; font-size: 15px; color: var(--text2); }
  .modal-footer { padding: 12px 20px 16px; border-top: 0.5px solid var(--border); display: flex; gap: 10px; justify-content: flex-end; flex-shrink: 0; }
  .modal-btn { font-size: 13px; padding: 7px 16px; border-radius: var(--radius-sm); border: 0.5px solid var(--border2); background: transparent; color: var(--text2); cursor: pointer; }
  .modal-btn.primary { background: var(--blue); color: white; border-color: var(--blue); }
  .empty { padding: 40px 16px; text-align: center; color: var(--text3); font-size: 14px; }
  .bottom-pad { height: 32px; }

  .toast { position: fixed; bottom: calc(var(--nav-height) + var(--safe-bottom) + 16px); left: 50%; transform: translateX(-50%) translateY(20px); background: var(--text); color: var(--bg); padding: 10px 18px; border-radius: 20px; font-size: 13px; opacity: 0; transition: all 0.25s; pointer-events: none; white-space: nowrap; z-index: 999; }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  /* Loading overlay */
  .loading-overlay { display: flex; align-items: center; justify-content: center; padding: 60px 16px; color: var(--text3); font-size: 14px; }

  /* Sprint tab */
  .sprint-block { margin: 16px 24px 0; }
  .sprint-block-header { margin-bottom: 8px; display: flex; align-items: flex-start; gap: 12px; }
  .sprint-block-num { font-size: 22px; font-weight: 700; color: var(--bg3); line-height: 1.1; flex-shrink: 0; min-width: 20px; }
  .sprint-block-meta { flex: 1; }
  .sprint-block-label-row { display: flex; align-items: baseline; justify-content: space-between; gap: 8px; }
  .sprint-block-label { font-size: 17px; font-weight: 600; color: var(--text); }
  .sprint-card { background: var(--card); border: 0.5px solid var(--border); border-radius: var(--radius); margin-bottom: 6px; display: flex; align-items: flex-start; padding: 10px 12px; gap: 10px; cursor: pointer; transition: opacity 0.15s; }
  .sprint-card.done { opacity: 0.4; }
  .sprint-check { width: 20px; height: 20px; border-radius: 50%; border: 1.5px solid var(--border2); flex-shrink: 0; display: flex; align-items: center; justify-content: center; transition: all 0.15s; margin-top: 1px; }
  .sprint-card.done .sprint-check { background: var(--green); border-color: var(--green); }
  .sprint-check-inner { width: 7px; height: 7px; border-right: 2px solid white; border-bottom: 2px solid white; transform: rotate(45deg) translate(-1px, -1px); display: none; }
  .sprint-card.done .sprint-check-inner { display: block; }
  .sprint-card-body { flex: 1; min-width: 0; }
  .sprint-card-top { display: flex; align-items: baseline; justify-content: space-between; gap: 8px; }
  .sprint-card-name { font-size: 14px; color: var(--text); }
  .sprint-card-time { font-size: 12px; color: var(--text3); white-space: nowrap; flex-shrink: 0; }
  .sprint-progress { padding: 12px 24px; background: var(--bg2); border-bottom: 0.5px solid var(--border); display: flex; align-items: center; gap: 10px; }
  .sprint-progress-label { font-size: 12px; color: var(--text3); text-transform: uppercase; letter-spacing: 0.05em; }
  .sprint-progress-stats { display: flex; align-items: center; gap: 10px; flex: 1; }
  .sprint-progress-bar-wrap { flex: 1; height: 4px; background: var(--bg3); border-radius: 2px; overflow: hidden; }
  .sprint-progress-bar { height: 100%; background: var(--green); border-radius: 2px; transition: width 0.3s; }
  .sprint-progress-text { font-size: 13px; font-weight: 500; color: var(--text2); white-space: nowrap; }
  .sprint-time-left { font-size: 12px; color: var(--text3); white-space: nowrap; }
  .sprint-block-time { font-size: 13px; color: var(--text3); white-space: nowrap; }
  .sprint-block-divider { height: 1px; background: var(--border); margin: 16px 24px 0; }

  .sprint-block-hint { font-size: 11px; color: var(--text3); margin-top: 1px; }
  .sprint-done-badge { font-size: 11px; font-weight: 500; color: var(--green); background: var(--green-bg); padding: 1px 7px; border-radius: 10px; margin-left: 6px; }

  /* Pin indicator */
  .pin-badge { font-size: 11px; color: var(--amber); margin-left: 2px; }
  .task-btn.pin-btn { color: var(--amber); border-color: var(--amber); }
  .task-btn.pin-btn.pinned { background: var(--amber-bg); }
  .sprint-pin { font-size: 11px; color: var(--amber); margin-left: 4px; }

  /* Redeal button */
  .redeal-btn { background: none; border: 0.5px solid var(--border2); border-radius: var(--radius-sm); padding: 5px 10px; font-size: 12px; color: var(--text2); cursor: pointer; }
  .redeal-btn:hover { background: var(--bg2); }
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <div class="header-inner">
      <div class="header-logo">
        <div class="header-logo-icon">🏠</div>
        <span class="header-logo-text">Home Tasks</span>
      </div>
    </div>
  </div>

  <div id="alinaView">
    <div class="view-hero">
      <div class="view-hero-left">
        <div class="view-hero-title">Today's Hand</div>
        <div class="view-hero-subtitle" id="heroDate"></div>
      </div>
      <button class="redeal-btn" onclick="redealHand()" title="Redeal today's hand">&#8635; Redeal</button>
    </div>
    <div class="stats-row">
      <div class="stats-row-top">
        <span class="stat-badge" id="progressText">0 / 0 done</span>
        <span class="stat-badge" id="totalTime"></span>
        <div class="stats-zone">
          <select class="zone-select" id="zoneSelect" onchange="saveZone()">
            <option value="0">No zone focus</option>

  1: ['Dining Room','Mud Room','Back Porch'],
  2: ['Kitchen'],

  4: ['Bedroom','US Bathroom'],

};

// Frequency label
function freqLabel(days) {
  if (days === 1) return 'daily';
  if (days <= 3) return 'every ' + days + ' days';
  if (days === 7) return 'weekly';
  if (days === 14) return 'every 2 weeks';
  if (days === 21) return 'every 3 weeks';
  if (days === 30) return 'monthly';
  if (days <= 45) return 'every ' + days + ' days';
  if (days === 90) return 'quarterly';
  if (days === 180) return 'twice a year';
  if (days === 365) return 'yearly';
  return 'every ' + days + ' days';
}

// Frequency CSS class for left border color
function freqClass(days) {
  if (days <= 3)  return 'freq-daily';
  if (days <= 14) return 'freq-week';
  if (days <= 60) return 'freq-month';
  return 'freq-long';
}

// ─── PERSISTENT STORAGE LAYER ──────────────────────────────────────────────
const STORAGE_KEY = 'hometasks_v8';
const STORAGE_KEY_V7 = 'hometasks_v7';
let saveDebounceTimer = null;
let isSaving = false;

function defaultState() {
  const now = Date.now();
  const completions = {};
  TASKS.forEach(t => {
    completions[t.id] = now - (t.freq * 86400000);
  });
  return { completions, budgetWeekday: 45, budgetWeekend: 90, zone: 0, hand: null, handDate: null, customTasks: {}, deletedIds: [], pinnedIds: [], starvation: {}, guestHand: null, resetHand: null };
}

async function loadState() {
  try {
    // Try v8 first
    let raw = localStorage.getItem(STORAGE_KEY);
    // Fall back to v7 migration if v8 not found
    if (!raw) {
      raw = localStorage.getItem(STORAGE_KEY_V7);
    }
    if (raw) {
      const parsed = JSON.parse(raw);
      // Migrate: cap → budgetWeekday/budgetWeekend
      let budgetWeekday = 45, budgetWeekend = 90;
      if (parsed.budgetWeekday != null) budgetWeekday = parsed.budgetWeekday;
      if (parsed.budgetWeekend != null) budgetWeekend = parsed.budgetWeekend;
      return {
        completions: parsed.completions || {},

        budgetWeekday,
        budgetWeekend,
        zone: parsed.zone != null ? parsed.zone : 0,
        hand: parsed.hand || null,
        handDate: parsed.handDate || null,
        customTasks: parsed.customTasks || {},
        deletedIds: parsed.deletedIds || [],
        pinnedIds: parsed.pinnedIds || [],
        starvation: parsed.starvation || {},
        guestHand: parsed.guestHand || null,
        resetHand: parsed.resetHand || null,
      };
    }
  } catch (e) {
    console.log('No existing state found, using defaults');
  }
  return defaultState();
}

function setSyncStatus(status) {
  const el = document.getElementById('syncIndicator');
  const label = document.getElementById('syncLabel');
  if (!el || !label) return;
  el.className = 'sync-indicator' + (status !== 'synced' ? ' ' + status : '');
  if (status === 'syncing') label.textContent = 'saving…';
  else if (status === 'error') label.textContent = 'sync error';
  else label.textContent = 'synced';
}

async function saveState() {
  // Debounce rapid saves: wait 300ms after last call
  if (saveDebounceTimer) clearTimeout(saveDebounceTimer);
  saveDebounceTimer = setTimeout(async () => {
    if (isSaving) return;
    isSaving = true;
    setSyncStatus('syncing');
    try {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
      setSyncStatus('synced');
    } catch (e) {
      console.error('Storage save error:', e);
      setSyncStatus('error');
    } finally {
      isSaving = false;
    }
  }, 300);
}

// ─── STATE (initialized async in init()) ───────────────────────────────────
let state = defaultState(); // placeholder until async load
let currentTab = 'alina';

// ─── CORE LOGIC ────────────────────────────────────────────────────────────

function todayStr() {
  const d = new Date();
  return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');
}

function isWeekend() {
  const d = new Date().getDay();
  return d === 0 || d === 6;
}

function fmtMinutes(min) {
  if (min < 60) return min + 'm';
  const h = Math.floor(min / 60);
  const m = min % 60;
  return m === 0 ? h + 'h' : h + 'h ' + m + 'm';
}

function daysOverdue(task) {
  const last = state.completions[task.id] || 0;
  if (task.freq === 1) {
    // Calendar-day based: due whenever last completion was on a previous calendar day
    if (!last) return 0;
    const d = new Date(last);
    const lastDateStr = d.getFullYear() + '-' + String(d.getMonth() + 1).padStart(2, '0') + '-' + String(d.getDate()).padStart(2, '0');
    if (lastDateStr >= todayStr()) return -0.5; // done today, not due
    const today = new Date();
    const todayMidnight = new Date(today.getFullYear(), today.getMonth(), today.getDate()).getTime();
    const lastMidnight = new Date(d.getFullYear(), d.getMonth(), d.getDate()).getTime();
    return (todayMidnight - lastMidnight) / 86400000 - 1; // 0 if done yesterday, 1 if 2 days ago, etc.
  }
  const nextDue = last + task.freq * 86400000;
  return (Date.now() - nextDue) / 86400000;
}

function isDue(task) { return daysOverdue(task) >= 0; }

function scoreTask(task, zone) {
  const zoneRooms = ZONE_ROOMS[zone] || [];
  const inZone = zoneRooms.some(r => task.room.includes(r) || r.includes(task.room));
  const overdue = daysOverdue(task);
  const overdueRatio = overdue / task.freq;

  let score = task.freq;
  if (task.cat) score -= 0.5;
  if (inZone) score -= 2;
  score -= Math.min(overdueRatio * task.freq * 0.5, task.freq * 0.8);
  const starvation = (state.starvation || {})[task.id] || 0;
  score -= starvation * 0.3;

  return score;
}

function getDueTasks(owner) {
  return getAllTasks()
    .filter(t => {
      if (!isDue(t)) return false;
      if (owner === 'alina') return t.owner === 'alina' || t.owner === 'either';
      if (owner === 'bob')   return t.owner === 'bob';
      return true;
    })
    .sort((a,b) => scoreTask(a, state.zone) - scoreTask(b, state.zone));
}

function getDailies() {
  return getAllTasks().filter(t =>
    t.freq === 1 &&
    isDue(t) &&
    (t.owner === 'alina' || t.owner === 'either')
  ).sort((a,b) => scoreTask(a, state.zone) - scoreTask(b, state.zone));
}

function dealHand() {
  const today = todayStr();
  if (state.handDate === today && state.hand) return;

  const pinned = (state.pinnedIds || []).filter(id => getAllTasks().find(t => t.id === id));
  const dailyIds = getDailies().map(t => t.id);
  const sortedNonDailies = getDueTasks('alina').filter(t => t.freq > 1);

  // Remove pinned from normal pools to avoid duplicates
  const pinnedSet = new Set(pinned);
  const dailyFiltered = dailyIds.filter(id => !pinnedSet.has(id));
  const nonDailyFiltered = sortedNonDailies.filter(t => !pinnedSet.has(t.id));

  // Time budget selection with effort balancing
  // Budget covers the whole hand (dailies + non-dailies)
  const budget = isWeekend() ? state.budgetWeekend : state.budgetWeekday;
  // Count time already spent today (completed tasks) + uncommitted dailies
  const allTasks = getAllTasks();
  const completedTodayTime = allTasks.filter(t => wasCompletedToday(t))
    .reduce((s, t) => s + t.time, 0);
  const uncommittedDailyTime = dailyFiltered.reduce((s, id) => {
    const t = allTasks.find(t => t.id === id);
    return s + (t && !wasCompletedToday(t) ? t.time : 0);
  }, 0);
  const HEAVY_THRESHOLD = 15;
  const HEAVY_MAX = 2;
  let timeUsed = completedTodayTime + uncommittedDailyTime;
  let heavyCount = 0;
  const selected = [];

  for (const task of nonDailyFiltered) {
    const isHeavy = task.time > HEAVY_THRESHOLD;
    if (isHeavy && heavyCount >= HEAVY_MAX) continue;
    if (timeUsed + task.time > budget && selected.length > 0) break;
    selected.push(task);
    timeUsed += task.time;
    if (isHeavy) heavyCount++;
  }

  const newHandIds = new Set([...pinned, ...dailyFiltered, ...selected.map(t => t.id)]);
  // Always keep tasks completed today in the hand, even across redeals
  getAllTasks().forEach(t => {
    if (wasCompletedToday(t) && !newHandIds.has(t.id)) newHandIds.add(t.id);
  });
  state.hand = [...newHandIds];
  state.handDate = today;

  // Starvation updates: boost tasks that were due but not selected
  if (!state.starvation) state.starvation = {};
  const handSet = new Set(state.hand);
  getAllTasks().forEach(t => {
    if (isDue(t) && !handSet.has(t.id)) {
      state.starvation[t.id] = (state.starvation[t.id] || 0) + 1;
    } else if (handSet.has(t.id)) {
      state.starvation[t.id] = 0;
    }
  });

  saveState();
}

function getHandTasks() {
  dealHand();
  const handTasks = state.hand.map(id => getAllTasks().find(t => t.id === id)).filter(Boolean);
  // Also include any tasks completed today that aren't already in the hand
  const handIds = new Set(state.hand);
  const completedToday = getAllTasks().filter(t =>
    !handIds.has(t.id) &&
    (t.owner === 'alina' || t.owner === 'either') &&
    wasCompletedToday(t)
  );
  return [...handTasks, ...completedToday];
}

function getOverflowTasks() {
  dealHand();
  return getDueTasks('alina').filter(t => t.freq > 1 && !state.hand.includes(t.id));
}

function getNotDueTasks() {
  return getAllTasks()
    .filter(t =>
      (t.owner === 'alina' || t.owner === 'either') &&
      !isDue(t) &&
      !state.hand.includes(t.id)
    )
    .sort((a,b) => {
      const aNext = (state.completions[a.id] || 0) + a.freq * 86400000;
      const bNext = (state.completions[b.id] || 0) + b.freq * 86400000;
      return aNext - bNext;
    });
}

function wasCompletedToday(task) {
  const last = state.completions[task.id] || 0;
  if (!last) return false;
  const d = new Date(last);
  const s = d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');
  return s === todayStr();
}

function completeTask(id) {
  const task = getAllTasks().find(t => t.id === id);
  if (!task) return;
  const prev = state.completions[id] || 0;
  const prevOverdue = (Date.now() - (prev + task.freq * 86400000)) / 86400000;
  state.completions[id] = Date.now();
  // Auto-unpin on completion
  if (state.pinnedIds && state.pinnedIds.includes(id)) {
    state.pinnedIds = state.pinnedIds.filter(p => p !== id);
  }
  saveState();
  render();
  showToast('Done!');
}

function uncompleteTask(id) {
  const task = getAllTasks().find(t => t.id === id);
  if (!task) return;
  state.completions[id] = Date.now() - task.freq * 86400000 - 3600000;
  saveState();
  render();
}

function swapTask(id) {
  const overflow = getOverflowTasks();
  if (!overflow.length) { showToast('Nothing else available'); return; }
  const idx = state.hand.indexOf(id);
  if (idx >= 0) state.hand[idx] = overflow[0].id;
  saveState();
  render();
  showToast('Swapped!');
}

function addMore() {
  const overflow = getOverflowTasks();
  const toAdd = overflow.slice(0, 3).map(t => t.id);
  if (!toAdd.length) { showToast('Nothing more due'); return; }
  state.hand = [...state.hand, ...toAdd];
  saveState();
  render();
  showToast('Added ' + toAdd.length + ' more task' + (toAdd.length>1?'s':''));
}

function pinTask(id) {
  if (!state.pinnedIds) state.pinnedIds = [];
  if (state.pinnedIds.includes(id)) return;
  state.pinnedIds.push(id);
  // If task isn't in hand, add it and bump lowest-priority non-pinned non-daily
  if (!state.hand.includes(id)) {
    state.hand.push(id);
    // Check if we're over cap for non-daily tasks
    const dailyIds = getDailies().map(t => t.id);
    const nonDailyInHand = state.hand.filter(hid => !dailyIds.includes(hid));
    const pinnedSet = new Set(state.pinnedIds);
    const nonPinnedNonDaily = nonDailyInHand.filter(hid => !pinnedSet.has(hid));
    if (nonPinnedNonDaily.length > 0) {
      // Remove lowest priority non-pinned non-daily (last in the sorted list)
      const bumpId = nonPinnedNonDaily[nonPinnedNonDaily.length - 1];
      state.hand = state.hand.filter(hid => hid !== bumpId);
    }
  }
  saveState();
  render();
  showToast('Pinned');
}

function unpinTask(id) {
  if (!state.pinnedIds) return;
  state.pinnedIds = state.pinnedIds.filter(p => p !== id);
  saveState();
  render();
  showToast('Unpinned');
}

function togglePin(id) {
  if (state.pinnedIds && state.pinnedIds.includes(id)) {
    unpinTask(id);
  } else {
    pinTask(id);
  }
}

function redealHand() {
  // Preserve pins across redeal
  state.hand = null;
  state.handDate = null;
  saveState();
  render();
  showToast('Hand redealt');
}

function setLastDone(id, dateStr) {
  if (!dateStr) return;
  const d = new Date(dateStr + 'T12:00:00');
  if (isNaN(d)) return;
  state.completions[id] = d.getTime();
  state.hand = null;
  saveState();
  render();
  showToast('Last done updated');
}

// ─── RENDER ────────────────────────────────────────────────────────────────

function render() {
  if (currentTab === 'alina') renderAlina();
  else if (currentTab === 'sprint') renderSprint();
  else if (currentTab === 'manage') renderManage();
  else if (currentTab === 'presets') renderPresets();
  else if (currentTab === 'settings') renderSettings();
}

function renderAlina() {
  const hand = getHandTasks();
  const doneCount = hand.filter(t => wasCompletedToday(t)).length;
  const totalMin = hand.reduce((s,t) => s + t.time, 0);

  const leftMin = hand.filter(t => !wasCompletedToday(t)).reduce((s,t) => s + t.time, 0);
  document.getElementById('progressText').textContent = doneCount + ' / ' + hand.length + ' done';
  document.getElementById('progressBar').style.width = hand.length ? Math.round(doneCount/hand.length*100) + '%' : '0%';
  document.getElementById('totalTime').textContent = '⏱ ~' + fmtMinutes(leftMin) + ' left';

  const dailyIds = getDailies().map(t => t.id);
  const dailies = hand.filter(t => dailyIds.includes(t.id));
  const capped  = hand.filter(t => !dailyIds.includes(t.id));
  const overflow = getOverflowTasks();
  const notDue = getNotDueTasks();

  let html = '';

  if (dailies.length) {
    const dailyLeftMin = dailies.filter(t => !wasCompletedToday(t)).reduce((s,t) => s + t.time, 0);
    const dailiesSorted = [...dailies.filter(t => !wasCompletedToday(t)), ...dailies.filter(t => wasCompletedToday(t))];
    html += '<div class="section"><div class="section-label"><span>Daily Tasks (' + dailies.length + ')</span><span class="section-label-time">⏱ ~' + fmtMinutes(dailyLeftMin) + ' remaining</span></div>';
    dailiesSorted.forEach(t => html += renderCard(t, false));
    html += '</div>';
  }

  if (capped.length) {
    const otherLeftMin = capped.filter(t => !wasCompletedToday(t)).reduce((s,t) => s + t.time, 0);
    const cappedSorted = [...capped.filter(t => !wasCompletedToday(t)), ...capped.filter(t => wasCompletedToday(t))];
    html += '<div class="section"><div class="section-label"><span>Other Tasks (' + capped.length + ')</span><span class="section-label-time">⏱ ~' + fmtMinutes(otherLeftMin) + ' remaining</span></div>';
    cappedSorted.forEach(t => html += renderCard(t, true));
    html += '</div>';
  }

  if (overflow.length || notDue.length) {
    const totalBackup = overflow.length + notDue.length;
    html += '<div class="overflow-section" style="margin-top:12px">';
    if (overflow.length) {
      html += '<button class="more-btn" onclick="addMore()">+ Give me more (' + overflow.length + ' due)</button>';
    }
    html += '<button class="overflow-toggle" id="overflowToggle" onclick="toggleOverflow()">' +
        '<svg width="12" height="12" viewBox="0 0 12 12" fill="none"><path d="M4 2l4 4-4 4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>' +
        'Backup list (' + totalBackup + ')' +
      '</button>' +
      '<div id="overflowList" style="display:none">';
    if (overflow.length) {
      html += '<div class="section" style="margin-top:8px"><div class="section-label">Due / overdue</div>';
      overflow.forEach(t => html += renderCard(t, true));
      html += '</div>';
    }
    if (notDue.length) {
      html += '<div class="section" style="margin-top:8px"><div class="section-label">Not due yet</div>';
      notDue.forEach(t => html += renderCard(t, false));
      html += '</div>';
    }
    html += '</div></div>';
  }

  if (!hand.length && !overflow.length) {
    html = '<div class="empty">Nothing due — all clear!</div>';
  }

  html += '<div class="bottom-pad"></div>';
  document.getElementById('alinaTaskList').innerHTML = html;
}

function renderCard(task, canSwap) {
  const isDone = wasCompletedToday(task);
  const overdue = daysOverdue(task);
  const fc = freqClass(task.freq);

  const last = state.completions[task.id] || 0;
  const lastDate = last ? new Date(last).toLocaleDateString('en-US', {month:'short', day:'numeric', year:'numeric'}) : 'never';
  const nextDue = new Date(last + task.freq * 86400000);

  let overdueHtml = '';
  if (!isDone) {
    if (overdue >= 1) overdueHtml = '<span class="task-overdue">' + Math.floor(overdue) + 'd overdue</span>';
    else if (overdue >= 0) overdueHtml = '<span class="task-overdue">due today</span>';
    else {
      const daysUntil = Math.ceil(-overdue);
      overdueHtml = '<span class="task-notdue">in ' + daysUntil + 'd</span>';
    }
  }

  const ownerHtml = task.owner === 'either' ? '<span class="owner-badge owner-bob">Bob too</span>' : '';
  const isPinned = state.pinnedIds && state.pinnedIds.includes(task.id);
  const pinBadge = isPinned ? '<span class="pin-badge">&#128204;</span>' : '';
  const swapBtn = canSwap && !isDone && !isPinned ? '<button class="task-btn swap-btn" onclick="event.stopPropagation();swapTask(\'' + task.id + '\')">swap</button>' : '';
  const undoBtn = isDone ? '<button class="task-btn" onclick="event.stopPropagation();uncompleteTask(\'' + task.id + '\')">undo</button>' : '';
  const pinBtn = !isDone ? '<button class="task-btn pin-btn' + (isPinned ? ' pinned' : '') + '" onclick="event.stopPropagation();togglePin(\'' + task.id + '\')">' + (isPinned ? 'unpin' : 'pin') + '</button>' : '';

  const dpId = 'dp_' + task.id;

  return '<div class="task-card ' + (isDone?'done':'') + '" id="card_' + task.id + '">' +
    '<div class="task-main" onclick="completeTask(\'' + task.id + '\')">' +
      '<div class="task-check"><div class="task-check-inner"></div></div>' +
      '<div class="task-body">' +
        '<div class="task-name">' + task.name + pinBadge + '</div>' +
        '<div class="task-meta">' +
          '<span class="task-room">📍 ' + task.room + '</span>' +
          '<span class="task-freq">' + freqLabel(task.freq) + '</span>' +
          '<span class="task-time">⏱ ' + fmtMinutes(task.time) + '</span>' +
          overdueHtml +
          ownerHtml +
        '</div>' +
      '</div>' +
    '</div>' +
    '<div class="task-detail">' +
      '<div class="task-lastdone">' +
        'Last done: ' + lastDate +
        ' <button class="edit-btn" onclick="event.stopPropagation();toggleDatePicker(\'' + dpId + '\')">edit</button>' +

const BLOCK_HINTS = {
  'Launch':           'Start passive tasks first',
  'Kitchen':          'Work through counters to sink',
  'Cat care':         'Water, food, litter',
  'Laundry':          'Check washer before moving on',
  'Bathrooms':        'Top to bottom, tidy first',
  'Bedroom':          'Tidy before making bed',
  'Living spaces':    'Tidy before wiping surfaces',
  'Office':           'Clear desk before dusting',
  'Hall & entries':   'Sweep last',
  'Around the house': 'Pick a circuit and go',
};

const ROOM_DISPLAY_NAMES = { 'Cats': 'Cat care' };

function tidyFirst(tasks) {
  return [...tasks].sort((a, b) => {
    const aT = /tidy/i.test(a.name);
    const bT = /tidy/i.test(b.name);
    if (aT && !bT) return -1;
    if (!aT && bT) return 1;
    return 0;
  });
}

function kitchenOrder(tasks) {
  // unload dishwasher → tidy → wipe counters → everything else
  function rank(t) {
    if (/unload.*dishwasher|dishwasher/i.test(t.name)) return 0;
    if (/tidy/i.test(t.name)) return 1;
    if (/wipe.*counter|counter.*wipe/i.test(t.name)) return 2;
    return 3;
  }
  return [...tasks].sort((a, b) => rank(a) - rank(b));
}

function bedroomOrder(tasks) {
  // make bed → tidy → everything else
  function rank(t) {
    if (/make.*bed|bed.*make/i.test(t.name)) return 0;
    if (/tidy/i.test(t.name)) return 1;
    return 2;
  }
  return [...tasks].sort((a, b) => rank(a) - rank(b));
}

function blockLabel(groupLabel, tasks) {
  const rooms = [...new Set(tasks.map(t => t.room))];
  const roomName = rooms.length === 1 ? (ROOM_DISPLAY_NAMES[rooms[0]] || rooms[0]) : null;
  return roomName || groupLabel;
}

function getSprintBlocks() {
  const hand = getHandTasks();
  if (!hand.length) return [];

  const assigned = new Set();
  const blocks = [];

  // ── LAUNCH: passive/cycle-starting tasks ──
  const LAUNCH_IDS = ['l_start', 'rob_run_ds', 'rob_run_us', 'rob_mop'];
  const launchTasks = hand.filter(t => LAUNCH_IDS.includes(t.id));
  if (launchTasks.length) {
    blocks.push({ label: 'Launch', tasks: tidyFirst(launchTasks) });
    launchTasks.forEach(t => assigned.add(t.id));
  }

  // ── KITCHEN: kitchen tasks in hand ──
  const kitchenTasks = hand.filter(t => t.room === 'Kitchen' && !assigned.has(t.id));
  if (kitchenTasks.length) {
    const label = blockLabel('Kitchen', kitchenTasks);
    blocks.push({ label, tasks: kitchenOrder(kitchenTasks) });
    kitchenTasks.forEach(t => assigned.add(t.id));
  }

  // ── CAT CARE ──
  const catTasks = hand.filter(t => (t.cat || t.room === 'Cats') && !assigned.has(t.id));
  if (catTasks.length) {
    const label = blockLabel('Cat care', catTasks);
    blocks.push({ label, tasks: tidyFirst(catTasks) });
    catTasks.forEach(t => assigned.add(t.id));
  }

  // ── LAUNDRY ISOLATION: l_dryer, l_fold, l_put_away get their own block ──
  const LAUNDRY_IDS = ['l_dryer', 'l_fold', 'l_put_away'];
  const laundryTasks = hand.filter(t => LAUNDRY_IDS.includes(t.id) && !assigned.has(t.id));
  if (laundryTasks.length) {
    blocks.push({ label: 'Laundry', tasks: laundryTasks });
    laundryTasks.forEach(t => assigned.add(t.id));
  }

  // ── REMAINING: group by room ──
  const ROOM_TO_GROUP = {
    'DS Bathroom': 'Bathrooms', 'US Bathroom': 'Bathrooms',
    'Bedroom': 'Bedroom',
    'Living Room': 'Living spaces', 'Dining Room': 'Living spaces',
    'Sunroom': 'Living spaces', 'Back Room': 'Living spaces',
    'Office': 'Office',
    'Laundry Room': 'Laundry room', 'Laundry': 'Laundry room',
    'Hall & Stairs': 'Hall & entries', 'Mud Room': 'Hall & entries', 'Back Porch': 'Hall & entries',
    'Whole House': 'Around the house', 'Robot': 'Around the house',
    'Downstairs': 'Around the house', 'Upstairs': 'Around the house',
  };
  const GROUP_ORDER = ['Bathrooms', 'Bedroom', 'Living spaces', 'Office', 'Laundry room', 'Hall & entries', 'Around the house'];

  const remaining = hand.filter(t => !assigned.has(t.id));
  const groups = {};
  remaining.forEach(t => {
    const group = ROOM_TO_GROUP[t.room] || 'Other';
    if (!groups[group]) groups[group] = [];
    groups[group].push(t);
  });

  const roomBlocks = [];
  GROUP_ORDER.forEach(g => {
    if (groups[g] && groups[g].length) {
      const label = blockLabel(g, groups[g]);
      const sortFn = g === 'Bedroom' ? bedroomOrder : tidyFirst;
      roomBlocks.push({ label, tasks: sortFn(groups[g]) });
    }
  });
  if (groups['Other'] && groups['Other'].length) {
    roomBlocks.push({ label: 'Other tasks', tasks: tidyFirst(groups['Other']) });
  }

  blocks.push(...roomBlocks);
  return blocks;
}

function renderSprint() {
  const hand = getHandTasks();
  const container = document.getElementById('sprintContent');

  if (!hand.length) {
    container.innerHTML = '<div class="empty">No tasks dealt yet — check the Alina tab first.</div>';
    return;
  }

  const sprintBlocks = getSprintBlocks();
  const doneCount = hand.filter(t => wasCompletedToday(t)).length;
  const totalMin = hand.reduce((s,t) => s + t.time, 0);
  const doneMin = hand.filter(t => wasCompletedToday(t)).reduce((s,t) => s + t.time, 0);
  const leftMin = totalMin - doneMin;

  let html = '<div class="sprint-progress">' +
    '<div class="sprint-progress-stats">' +
      '<span class="sprint-progress-label">Sprint</span>' +
      '<div class="sprint-progress-bar-wrap">' +
        '<div class="sprint-progress-bar" style="width:' + (hand.length ? Math.round(doneCount/hand.length*100) : 0) + '%"></div>' +
      '</div>' +
      '<span class="sprint-progress-text">' + doneCount + ' / ' + hand.length + '</span>' +
    '</div>' +
    '<span class="sprint-time-left">~' + fmtMinutes(leftMin) + ' left</span>' +
  '</div>';

  sprintBlocks.forEach((block, blockIdx) => {
    if (blockIdx > 0) html += '<div class="sprint-block-divider"></div>';
    const allDone = block.tasks.every(t => wasCompletedToday(t));
    const blockHint = BLOCK_HINTS[block.label] || '';
    const blockLeftMin = block.tasks.filter(t => !wasCompletedToday(t)).reduce((s,t) => s + t.time, 0);
    html += '<div class="sprint-block">' +
      '<div class="sprint-block-header">' +
        '<span class="sprint-block-num">' + (blockIdx + 1) + '</span>' +
        '<div class="sprint-block-meta">' +
          '<div class="sprint-block-label-row">' +
            '<span class="sprint-block-label">' + block.label + '</span>' +
            (allDone ? '<span class="sprint-done-badge">Done! ✓</span>' : '<span class="sprint-block-time">⏱ ~' + fmtMinutes(blockLeftMin) + '</span>') +
          '</div>' +
          (blockHint ? '<div class="sprint-block-hint">' + blockHint + '</div>' : '') +
        '</div>' +
      '</div>';

    block.tasks.forEach(t => {
      const isDone = wasCompletedToday(t);
      const sPinned = state.pinnedIds && state.pinnedIds.includes(t.id);
      html += '<div class="sprint-card ' + (isDone ? 'done' : '') + '" onclick="completeTask(\'' + t.id + '\')">' +
        '<div class="sprint-check"><div class="sprint-check-inner"></div></div>' +
        '<div class="sprint-card-body">' +
          '<div class="sprint-card-top">' +
            '<span class="sprint-card-name">' + t.name + (sPinned ? '<span class="sprint-pin">&#128204;</span>' : '') + '</span>' +
            '<span class="sprint-card-time">' + fmtMinutes(t.time) + '</span>' +
          '</div>' +
        '</div>' +
      '</div>';
    });

    html += '</div>';
  });

  html += '<div class="bottom-pad"></div>';
  container.innerHTML = html;
}

      '<input class="search-input" placeholder="🔍 Search..." value="' + manageSearch.replace(/"/g,'&quot;') + '" oninput="manageSearch=this.value;renderManage()">' +
      '<select class="filter-select" onchange="manageOwnerFilter=this.value;renderManage()">' +
        '<option value="all"' + (manageOwnerFilter==='all'?' selected':'') + '>All</option>' +
        '<option value="alina"' + (manageOwnerFilter==='alina'?' selected':'') + '>Alina</option>' +
        '<option value="bob"' + (manageOwnerFilter==='bob'?' selected':'') + '>Bob</option>' +
        '<option value="either"' + (manageOwnerFilter==='either'?' selected':'') + '>Either</option>' +
      '</select>' +
      '<select class="filter-select" onchange="manageRoomFilter=this.value;renderManage()">' +
        '<option value="all"' + (manageRoomFilter==='all'?' selected':'') + '>All rooms</option>' +
        roomOpts +
      '</select>' +
    '</div>' +
    '<div class="manage-list">';

  const search = manageSearch.toLowerCase();
  const filtered = allTasks.filter(t => {
    if (manageOwnerFilter !== 'all' && t.owner !== manageOwnerFilter) return false;
    if (manageRoomFilter !== 'all' && t.room !== manageRoomFilter) return false;
    if (search && !t.name.toLowerCase().includes(search)) return false;
    return true;
  }).sort((a,b) => a.freq - b.freq || a.name.localeCompare(b.name));

  filtered.forEach(t => {
    const isCustom = !!(state.customTasks && state.customTasks[t.id]);
    const ownerLabel = t.owner === 'alina' ? 'Alina' : t.owner === 'bob' ? 'Bob' : 'Either';
    const overdue = daysOverdue(t);
    const statusHtml = overdue >= 0
      ? '<span class="status-due">Due</span>'
      : '<span class="status-ok">in ' + Math.ceil(-overdue) + 'd</span>';
    const isDoneToday = wasCompletedToday(t);
    const last = state.completions[t.id] || 0;
    const lastDate = last ? new Date(last).toLocaleDateString('en-US', {month:'short', day:'numeric'}) : 'never';
    const mdpId = 'mdp_' + t.id;
    const inHand = !!(state.hand && state.hand.includes(t.id));
    html +=
      '<div class="manage-card' + (isDoneToday ? ' mc-done' : '') + '">' +
        '<div class="manage-card-main">' +
          '<button class="mc-check" onclick="' + (isDoneToday ? 'uncompleteTask' : 'completeTask') + '(\'' + t.id + '\')">' +
            '<div class="mc-check-inner"></div>' +
          '</button>' +
          '<div class="manage-card-body">' +
            '<div class="manage-card-name">' + t.name + (isCustom ? ' <span style="font-size:11px;color:var(--blue)">custom</span>' : '') + '</div>' +
            '<div class="manage-card-meta">' + t.room + ' · ' + freqLabel(t.freq) + ' · ' + ownerLabel + ' · ' + statusHtml + '</div>' +
          '</div>' +
          '<div class="manage-card-icons">' +
            '<button class="icon-btn" onclick="openModal(\'' + t.id + '\')" title="Edit">&#9998;</button>' +
            '<button class="icon-btn danger" onclick="deleteTask(\'' + t.id + '\')" title="Delete">&#10005;</button>' +
          '</div>' +
        '</div>' +
        '<div class="manage-card-foot">' +
          '<span class="manage-card-last">Last: ' + lastDate + ' <button class="edit-btn" onclick="toggleManageDp(\'' + mdpId + '\')">edit</button></span>' +
          '<button class="manage-hand-btn' + (inHand ? ' in-hand' : '') + '" onclick="' + (inHand ? 'removeFromHand' : 'addToHand') + '(\'' + t.id + '\')">' + (inHand ? '✓ In hand' : '+ Today') + '</button>' +
        '</div>' +
        '<div class="manage-dp-row" id="' + mdpId + '">' +
          '<input type="date" class="date-input" id="minput_' + t.id + '" value="' + (last ? new Date(last).toISOString().slice(0,10) : '') + '">' +
          '<button class="date-save-btn" onclick="saveManageDate(\'' + t.id + '\')">save</button>' +
        '</div>' +
      '</div>';
  });

  html += '</div><div class="bottom-pad"></div>';
  document.getElementById('manageTaskList').innerHTML = html;
}

function getAllTasks() {
  const deleted = state.deletedIds || [];
  const custom = Object.values(state.customTasks || {});
  return [...TASKS.filter(t => !deleted.includes(t.id)), ...custom];
}

function openModal(id) {
  editingId = id;
  const modal = document.getElementById('taskModal');
  document.getElementById('modalTitle').textContent = id ? 'Edit task' : 'Add task';

  if (id) {
    const task = getAllTasks().find(t => t.id === id);
    if (!task) return;
    document.getElementById('f_name').value = task.name;
    document.getElementById('f_room').value = task.room;
    document.getElementById('f_freq').value = task.freq;
    document.getElementById('f_time').value = task.time;
    document.getElementById('f_owner').value = task.owner;
    document.getElementById('f_cat').checked = !!task.cat;
  } else {
    document.getElementById('f_name').value = '';
    document.getElementById('f_room').value = '';
    document.getElementById('f_freq').value = '';
    document.getElementById('f_time').value = '';
    document.getElementById('f_owner').value = 'either';
    document.getElementById('f_cat').checked = false;
  }
  modal.classList.add('open');
}

function closeModal() {
  document.getElementById('taskModal').classList.remove('open');
  editingId = null;
}

function saveTask() {
  const name = document.getElementById('f_name').value.trim();
  const room = document.getElementById('f_room').value.trim();
  const freq = parseInt(document.getElementById('f_freq').value);
  const time = parseInt(document.getElementById('f_time').value);
  const owner = document.getElementById('f_owner').value;
  const cat = document.getElementById('f_cat').checked;

  if (!name || !room || !freq || !time) { showToast('Fill in all fields'); return; }

  if (!state.customTasks) state.customTasks = {};
  if (!state.deletedIds) state.deletedIds = [];

  if (editingId) {
    const isBase = TASKS.find(t => t.id === editingId);
    if (isBase) state.deletedIds = [...new Set([...state.deletedIds, editingId])];
    state.customTasks[editingId] = { id: editingId, name, room, freq, time, owner, cat };
  } else {
    const newId = 'custom_' + Date.now();
    state.customTasks[newId] = { id: newId, name, room, freq, time, owner, cat };
    state.completions[newId] = Date.now() - freq * 86400000;
  }

  state.hand = null;
  saveState();
  closeModal();
  renderManage();
  showToast(editingId ? 'Task updated' : 'Task added');
}

function deleteTask(id) {
  if (!confirm('Delete this task?')) return;
  if (!state.deletedIds) state.deletedIds = [];
  if (!state.customTasks) state.customTasks = {};
  if (state.customTasks[id]) {
    delete state.customTasks[id];
  } else {
    state.deletedIds = [...new Set([...state.deletedIds, id])];
  }
  state.hand = null;
  saveState();
  renderManage();
  showToast('Task deleted');
}



function addToHand(id) {
  if (!state.hand) dealHand();
  if (!state.hand.includes(id)) {
    state.hand.push(id);
    saveState();
    renderManage();
    showToast('Added to today\'s hand');
  }
}

function removeFromHand(id) {
  if (!state.hand) return;
  state.hand = state.hand.filter(h => h !== id);
  if (state.pinnedIds) state.pinnedIds = state.pinnedIds.filter(p => p !== id);
  saveState();
  renderManage();
  showToast('Removed from hand');
}

function toggleManageDp(dpId) {
  const row = document.getElementById(dpId);
  if (!row) return;
  const isOpen = row.classList.contains('open');
  document.querySelectorAll('.manage-dp-row.open').forEach(r => r.classList.remove('open'));
  if (!isOpen) row.classList.add('open');
}

function saveManageDate(taskId) {
  const input = document.getElementById('minput_' + taskId);
  if (!input) return;
  setLastDone(taskId, input.value);
}

function saveZone() {
  state.zone = parseInt(document.getElementById('zoneSelect').value);
  state.hand = null;
  saveState();
  render();
}

function toggleOverflow() {
  const list = document.getElementById('overflowList');
  const btn = document.getElementById('overflowToggle');
  if (!list || !btn) return;
  const open = list.style.display !== 'none';
  list.style.display = open ? 'none' : 'block';
  btn.classList.toggle('open', !open);
}

function toggleDatePicker(dpId) {
  const row = document.getElementById(dpId);
  if (!row) return;
  const isOpen = row.classList.contains('open');
  document.querySelectorAll('.date-picker-row.open').forEach(r => r.classList.remove('open'));
  if (!isOpen) row.classList.add('open');
}

function saveDate(taskId) {
  const input = document.getElementById('input_' + taskId);
  if (!input) return;
  setLastDone(taskId, input.value);
}

let toastTimer;
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 1800);
}

// ─── ASYNC INIT ────────────────────────────────────────────────────────────
async function init() {
  const now = new Date();
  const dateStr = now.toLocaleDateString('en-US', {weekday:'long', month:'long', day:'numeric'});
  const heroDateEl = document.getElementById('heroDate');
  if (heroDateEl) heroDateEl.textContent = dateStr;

  // Load state from persistent storage
  state = await loadState();

  // Apply loaded settings to UI
  const zoneEl = document.getElementById('zoneSelect');
  if (zoneEl) zoneEl.value = state.zone;

  render();
}

init();
</script>
</body>
</html>
