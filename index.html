  <!DOCTYPE html>
  <html lang="en">
  <head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <title>Home Tasks</title>
  <style>
    :root {
      --bg: #fafaf8; --bg2: #f1efe8; --bg3: #e8e6df;
      --card: #ffffff; --border: rgba(0,0,0,0.1); --border2: rgba(0,0,0,0.18);
      --text: #2c2c2a; --text2: #5f5e5a; --text3: #888780;
      --red: #e24b4a; --red-bg: #fcebeb;
      --amber: #ba7517; --amber-bg: #faeeda;
      --green: #3b6d11; --green-bg: #eaf3de;
      --blue: #185fa5; --blue-bg: #e6f1fb;
      --radius: 10px; --radius-sm: 6px;
      --safe-top: env(safe-area-inset-top);
      --safe-bottom: env(safe-area-inset-bottom);
      --nav-height: 49px;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #1a1a18; --bg2: #222220; --bg3: #2c2c2a;
        --card: #252523; --border: rgba(255,255,255,0.1); --border2: rgba(255,255,255,0.18);
        --text: #f1efe8; --text2: #b4b2a9; --text3: #888780;
        --red-bg: #3d1a1a; --amber-bg: #2e1f08; --green-bg: #1a2e0a; --blue-bg: #0c2240;
      }
    }
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    input, select, textarea { -webkit-appearance: none; appearance: none; border-radius: var(--radius-sm); }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); font-size: 15px; line-height: 1.5; -webkit-text-size-adjust: 100%; }
    .app { max-width: 100%; min-height: 100vh; padding-bottom: calc(var(--nav-height) + var(--safe-bottom)); }
  
    .header { padding: env(safe-area-inset-top) 24px 0; border-bottom: 0.5px solid var(--border); background: var(--card); position: sticky; top: 0; z-index: 100; }
    .header-inner { display: flex; justify-content: space-between; align-items: center; height: 52px; }
    .header-logo { display: flex; align-items: center; gap: 8px; }
    .header-logo-icon { width: 28px; height: 28px; background: var(--green); border-radius: 6px; display: flex; align-items: center; justify-content: center; color: white; font-size: 15px; flex-shrink: 0; }
    .header-logo-text { font-size: 16px; font-weight: 500; color: var(--text); }
    @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.3; } }
  
    .tab-row { display: none; }
    .bottom-nav { position: fixed; bottom: 0; left: 0; right: 0; height: calc(var(--nav-height) + var(--safe-bottom)); padding-bottom: var(--safe-bottom); background: var(--card); border-top: 0.5px solid var(--border); display: flex; z-index: 100; backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); }
    .tab { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 3px; border: none; background: transparent; color: var(--text3); cursor: pointer; padding: 6px 2px 4px; min-height: var(--nav-height); transition: color 0.15s; }
    .tab.active { color: var(--green); }
    .tab-icon { font-size: 20px; line-height: 1; }
    .tab-label { font-size: 10px; font-weight: 500; letter-spacing: 0.01em; }
  
    /* Hero header (Alina view) */
    .view-hero { padding: 20px 24px 16px; border-bottom: 0.5px solid var(--border); display: flex; align-items: flex-end; justify-content: space-between; }
    .view-hero-left { }
    .view-hero-title { font-size: 28px; font-weight: 600; line-height: 1.2; }
    .view-hero-subtitle { font-size: 14px; color: var(--text3); margin-top: 2px; }
  
    /* Stats row */
    .stats-row { padding: 10px 24px; border-bottom: 0.5px solid var(--border); background: var(--bg2); }
    .stats-row-top { display: flex; align-items: center; gap: 10px; }
    .stat-badge { font-size: 12px; padding: 3px 10px; border-radius: 12px; background: var(--card); border: 0.5px solid var(--border2); color: var(--text2); white-space: nowrap; }
    .stats-zone { margin-left: auto; }
    .zone-select { border: 0.5px solid var(--border2); background: var(--card); color: var(--text2); font-size: 16px; padding: 3px 8px; border-radius: var(--radius-sm); max-width: 180px; }
    .stats-progress-wrap { height: 4px; background: var(--bg3); border-radius: 2px; overflow: hidden; margin-top: 8px; }
    .progress-bar { height: 100%; background: var(--green); border-radius: 2px; transition: width 0.3s; }
    .mode-selector { display: flex; gap: 6px; margin-top: 8px; }
    .mode-btn { flex: 1; font-size: 12px; padding: 5px 8px; border-radius: 12px; border: 0.5px solid var(--border2); background: var(--card); color: var(--text2); cursor: pointer; white-space: nowrap; transition: background 0.15s, color 0.15s; }
    .mode-btn.active { background: var(--green); color: #fff; border-color: transparent; }

    /* Settings page cards */
    .settings-card { background: var(--card); border: 0.5px solid var(--border); border-radius: var(--radius); padding: 20px 24px; margin: 16px 24px 0; }
    .settings-card-title { font-size: 15px; font-weight: 600; margin-bottom: 4px; }
    .settings-card-desc { font-size: 13px; color: var(--text3); margin-bottom: 14px; }
    .settings-row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; }
    .settings-row:last-child { margin-bottom: 0; }
    .settings-label { font-size: 13px; color: var(--text2); }
    .settings-control { display: flex; align-items: center; gap: 8px; }
    .stepper-btn { width: 28px; height: 28px; border-radius: 50%; border: 0.5px solid var(--border2); background: var(--bg2); color: var(--text); font-size: 16px; cursor: pointer; display: flex; align-items: center; justify-content: center; }
    .stepper-val { font-size: 14px; font-weight: 500; min-width: 24px; text-align: center; }
    .settings-save-btn { font-size: 12px; padding: 4px 12px; border-radius: var(--radius-sm); border: 0.5px solid var(--green); background: transparent; color: var(--green); cursor: pointer; }
    .settings-summary { font-size: 12px; color: var(--text3); margin-top: 10px; }
    .settings-stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 4px; }
    .settings-stat-box { background: var(--bg2); border-radius: var(--radius-sm); padding: 12px 14px; }
    .settings-stat-num { font-size: 22px; font-weight: 600; }
    .settings-stat-label { font-size: 12px; color: var(--text3); }
    .zone-ref-table { width: 100%; border-collapse: collapse; font-size: 12px; margin-top: 10px; }
    .zone-ref-table th { text-align: left; color: var(--text3); font-weight: 500; padding: 4px 0; border-bottom: 0.5px solid var(--border); }
    .zone-ref-table td { padding: 5px 0; border-bottom: 0.5px solid var(--border); color: var(--text2); vertical-align: top; }
    .zone-ref-table td:first-child { font-weight: 500; color: var(--text); width: 70px; white-space: nowrap; padding-right: 12px; }
  
    .section { padding: 0 24px; margin-top: 16px; }
    .section-label { font-size: 11px; font-weight: 500; text-transform: uppercase; letter-spacing: 0.08em; color: var(--text3); margin-bottom: 8px; padding-left: 2px; display: flex; justify-content: space-between; align-items: center; }
    .section-label-time { font-weight: 400; font-size: 11px; color: var(--text3); letter-spacing: 0; text-transform: none; }
    .section-label-btn { background: none; border: none; color: var(--text3); cursor: pointer; display: flex; align-items: center; gap: 4px; font-size: 11px; font-weight: 500; text-transform: uppercase; letter-spacing: 0.08em; padding: 0; }
    .section-label-btn svg { transition: transform 0.2s; flex-shrink: 0; }
    .section-label-btn.open svg { transform: rotate(90deg); }
  
    .task-card { background: var(--card); border: 0.5px solid var(--border); border-radius: var(--radius); margin-bottom: 6px; overflow: hidden; }
    .task-card.done { opacity: 0.45; }
    .task-main { display: flex; align-items: center; padding: 14px 16px; gap: 12px; cursor: pointer; }
    .task-check { width: 24px; height: 24px; border-radius: 50%; border: 1.5px solid var(--border2); flex-shrink: 0; display: flex; align-items: center; justify-content: center; transition: all 0.15s; }
    .task-card.done .task-check { background: var(--green); border-color: var(--green); }
    .task-check-inner { width: 8px; height: 8px; border-right: 2px solid white; border-bottom: 2px solid white; transform: rotate(45deg) translate(-1px, -2px); display: none; }
    .task-card.done .task-check-inner { display: block; }
    .task-body { flex: 1; min-width: 0; }
    .task-name { font-size: 15px; font-weight: 500; color: var(--text); }
    .task-meta { display: flex; align-items: center; gap: 6px; margin-top: 3px; flex-wrap: wrap; }
    .task-room { font-size: 12px; color: var(--text3); }
    .task-dot { font-size: 10px; color: var(--border2); }
    .task-time { font-size: 12px; color: var(--text3); }
    .task-freq { font-size: 11px; color: var(--text3); background: var(--bg2); padding: 1px 6px; border-radius: 8px; }
    .task-overdue { font-size: 11px; padding: 1px 6px; border-radius: 10px; background: var(--red-bg); color: var(--red); font-weight: 500; }
    .task-notdue  { font-size: 11px; padding: 1px 6px; border-radius: 10px; background: var(--bg3); color: var(--text3); }
  
    .owner-badge { font-size: 11px; padding: 1px 6px; border-radius: 10px; font-weight: 500; }
    .owner-alina { background: var(--purple-bg, #eeedfe); color: var(--purple, #534ab7); }
    .owner-bob   { background: var(--teal-bg, #e1f5ee);   color: var(--teal, #0f6e56); }
  
    .task-detail { padding: 0 12px 4px 48px; }
    .task-lastdone { font-size: 12px; color: var(--text3); display: flex; align-items: center; gap: 6px; }
    .edit-btn { font-size: 11px; padding: 2px 7px; border-radius: var(--radius-sm); border: 0.5px solid var(--border2); background: transparent; color: var(--text3); cursor: pointer; }
    .edit-btn:hover { background: var(--bg2); }
    .date-picker-row { display: none; align-items: center; gap: 8px; margin-top: 4px; padding-bottom: 4px; }
    .date-picker-row.open { display: flex; }
    .date-input { border: 0.5px solid var(--border2); background: var(--card); color: var(--text); font-size: 12px; padding: 3px 7px; border-radius: var(--radius-sm); }
    .date-save-btn { font-size: 12px; padding: 3px 10px; border-radius: var(--radius-sm); border: 0.5px solid var(--green); background: transparent; color: var(--green); cursor: pointer; }
    .snooze-picker-row { display: none; align-items: center; gap: 6px; margin-top: 4px; padding-bottom: 4px; }
    .snooze-picker-row.open { display: flex; }
    .snooze-day-btn { font-size: 12px; padding: 3px 12px; border-radius: var(--radius-sm); border: 0.5px solid var(--amber); background: transparent; color: var(--amber); cursor: pointer; }
    .task-snoozed { font-size: 11px; padding: 1px 6px; border-radius: 10px; background: var(--amber-bg); color: var(--amber); font-weight: 500; }
  
    .task-actions { display: flex; gap: 6px; padding: 0 12px 12px 48px; flex-wrap: wrap; }
    .task-btn { font-size: 12px; padding: 4px 10px; border-radius: var(--radius-sm); border: 0.5px solid var(--border2); background: transparent; color: var(--text2); cursor: pointer; transition: background 0.12s; min-height: 28px; }
    .task-btn:active { background: var(--bg2); }
    .task-btn.swap-btn { color: var(--blue); border-color: var(--blue); }
  
    .more-btn { width: 100%; padding: 11px; border-radius: var(--radius); border: 0.5px dashed var(--border2); background: transparent; color: var(--text2); font-size: 13px; cursor: pointer; margin-bottom: 8px; transition: background 0.12s; }
    .more-btn:hover { background: var(--bg2); }
  
    .overflow-section { padding: 0 24px; margin-top: 8px; }
    .overflow-toggle { display: flex; align-items: center; gap: 6px; background: none; border: none; color: var(--text3); font-size: 12px; cursor: pointer; padding: 4px 2px; margin-bottom: 8px; }
    .overflow-toggle svg { transition: transform 0.2s; }
    .overflow-toggle.open svg { transform: rotate(90deg); }
  
  
    /* All Tasks (manage) tab */
    .manage-header { padding: 16px 24px 12px; display: flex; justify-content: space-between; align-items: center; border-bottom: 0.5px solid var(--border); }
    .manage-header-left { }
    .manage-title { font-size: 18px; font-weight: 600; }
    .manage-subtitle { font-size: 13px; color: var(--text3); margin-top: 2px; }
    .add-btn { font-size: 13px; padding: 7px 16px; border-radius: var(--radius-sm); border: none; background: var(--green); color: white; cursor: pointer; font-weight: 500; }
    .manage-toolbar { padding: 10px 24px; display: flex; gap: 8px; flex-wrap: wrap; border-bottom: 0.5px solid var(--border); background: var(--bg2); }
    .search-input { flex: 1; min-width: 100px; border: 0.5px solid var(--border2); background: var(--card); color: var(--text); font-size: 16px; padding: 8px 10px; border-radius: var(--radius-sm); }
    .filter-select { border: 0.5px solid var(--border2); background: var(--card); color: var(--text2); font-size: 16px; padding: 7px 8px; border-radius: var(--radius-sm); }
    .tasks-table { width: 100%; border-collapse: collapse; }
    .tasks-table th { text-align: left; font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.06em; color: var(--text3); padding: 10px 24px; border-bottom: 0.5px solid var(--border); background: var(--bg2); }
    .tasks-table td { padding: 10px 24px; border-bottom: 0.5px solid var(--border); font-size: 13px; color: var(--text2); vertical-align: middle; }
    .tasks-table td:first-child { color: var(--text); font-size: 14px; }
    .tasks-table tr:hover td { background: var(--bg2); }
    .status-due { font-size: 11px; padding: 2px 8px; border-radius: 10px; background: var(--red-bg); color: var(--red); font-weight: 600; }
    .status-ok { font-size: 11px; padding: 2px 8px; border-radius: 10px; background: var(--bg3); color: var(--text3); }
    .manage-row-actions { display: flex; gap: 4px; }
    .icon-btn { width: 28px; height: 28px; border-radius: var(--radius-sm); border: 0.5px solid var(--border2); background: transparent; color: var(--text2); cursor: pointer; font-size: 13px; display: flex; align-items: center; justify-content: center; }
    .icon-btn.danger { color: var(--red); border-color: var(--red); }
    /* Mobile manage cards */
    .manage-list { padding: 0 16px; margin-top: 8px; }
    .manage-card { background: var(--card); border: 0.5px solid var(--border); border-radius: var(--radius); margin-bottom: 6px; overflow: hidden; transition: opacity 0.15s; }
    .manage-card.mc-done { opacity: 0.5; }
    .manage-card-main { display: flex; align-items: flex-start; padding: 12px 12px 4px 12px; gap: 10px; }
    .mc-check { width: 28px; height: 28px; border-radius: 50%; border: 1.5px solid var(--border2); flex-shrink: 0; display: flex; align-items: center; justify-content: center; background: transparent; cursor: pointer; margin-top: 1px; }
    .manage-card.mc-done .mc-check { background: var(--green); border-color: var(--green); }
    .mc-check-inner { width: 8px; height: 8px; border-right: 2px solid white; border-bottom: 2px solid white; transform: rotate(45deg) translate(-1px,-2px); display: none; }
    .manage-card.mc-done .mc-check-inner { display: block; }
    .manage-card-body { flex: 1; min-width: 0; }
    .manage-card-name { font-size: 15px; font-weight: 500; color: var(--text); line-height: 1.3; }
    .manage-card-meta { font-size: 12px; color: var(--text3); margin-top: 3px; display: flex; flex-wrap: wrap; gap: 4px; align-items: center; }
    .manage-card-icons { display: flex; gap: 6px; flex-shrink: 0; margin-top: 2px; }
    .manage-card-foot { display: flex; align-items: center; gap: 8px; padding: 6px 12px 10px 50px; }
    .manage-card-last { font-size: 12px; color: var(--text3); flex: 1; }
    .manage-hand-btn { font-size: 12px; padding: 5px 12px; border-radius: var(--radius-sm); border: 0.5px solid var(--border2); background: transparent; color: var(--text2); cursor: pointer; white-space: nowrap; min-height: 32px; }
    .manage-hand-btn.in-hand { border-color: var(--green); color: var(--green); background: var(--green-bg); }
    .manage-dp-row { display: none; align-items: center; gap: 8px; padding: 0 12px 10px 50px; }
    .manage-dp-row.open { display: flex; }
    /* Modal — bottom sheet */
    .modal-backdrop { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.45); z-index: 200; align-items: flex-end; justify-content: center; padding: 0; }
    .modal-backdrop.open { display: flex; }
    .modal { background: var(--card); border-radius: 16px 16px 0 0; width: 100%; max-width: 100%; overflow: hidden; padding-bottom: env(safe-area-inset-bottom); max-height: 92vh; display: flex; flex-direction: column; }
    .modal-header { padding: 16px 20px; border-bottom: 0.5px solid var(--border); display: flex; justify-content: space-between; align-items: center; flex-shrink: 0; }
    .modal-title { font-size: 17px; font-weight: 600; }
    .modal-close { background: none; border: none; font-size: 20px; color: var(--text2); cursor: pointer; padding: 4px 8px; min-width: 44px; min-height: 44px; display: flex; align-items: center; justify-content: center; }
    .modal-body { padding: 16px 20px; display: flex; flex-direction: column; gap: 14px; overflow-y: auto; -webkit-overflow-scrolling: touch; flex: 1; }
    .field-label { font-size: 13px; color: var(--text3); margin-bottom: 5px; }
    .field-input { width: 100%; border: 0.5px solid var(--border2); background: var(--card); color: var(--text); font-size: 16px; padding: 10px 12px; border-radius: var(--radius-sm); }
    .field-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    .field-select { width: 100%; border: 0.5px solid var(--border2); background: var(--card); color: var(--text); font-size: 16px; padding: 10px 12px; border-radius: var(--radius-sm); }
    .field-check-row { display: flex; align-items: center; gap: 10px; font-size: 15px; color: var(--text2); }
    .modal-footer { padding: 12px 20px 16px; border-top: 0.5px solid var(--border); display: flex; gap: 10px; justify-content: flex-end; flex-shrink: 0; }
    .modal-btn { font-size: 13px; padding: 7px 16px; border-radius: var(--radius-sm); border: 0.5px solid var(--border2); background: transparent; color: var(--text2); cursor: pointer; }
    .modal-btn.primary { background: var(--blue); color: white; border-color: var(--blue); }
    .empty { padding: 40px 16px; text-align: center; color: var(--text3); font-size: 14px; }
    .bottom-pad { height: 32px; }
  
    .toast { position: fixed; bottom: calc(var(--nav-height) + var(--safe-bottom) + 16px); left: 50%; transform: translateX(-50%) translateY(20px); background: var(--text); color: var(--bg); padding: 10px 18px; border-radius: 20px; font-size: 13px; opacity: 0; transition: all 0.25s; pointer-events: none; white-space: nowrap; z-index: 999; }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
    .toast.undoable { pointer-events: auto; }
    .toast-undo-btn { background: none; border: none; color: var(--amber); font-size: 13px; font-weight: 600; margin-left: 10px; cursor: pointer; padding: 0; }
  
    /* Loading overlay */
    .loading-overlay { display: flex; align-items: center; justify-content: center; padding: 60px 16px; color: var(--text3); font-size: 14px; }
  
    /* Sprint tab */
    .sprint-block { margin: 16px 24px 0; }
    .sprint-block-header { margin-bottom: 8px; display: flex; align-items: flex-start; gap: 12px; }
    .sprint-block-num { font-size: 22px; font-weight: 700; color: var(--bg3); line-height: 1.1; flex-shrink: 0; min-width: 20px; }
    .sprint-block-meta { flex: 1; }
    .sprint-block-label-row { display: flex; align-items: baseline; justify-content: space-between; gap: 8px; }
    .sprint-block-label { font-size: 17px; font-weight: 600; color: var(--text); }
    .sprint-card { background: var(--card); border: 0.5px solid var(--border); border-radius: var(--radius); margin-bottom: 6px; display: flex; align-items: flex-start; padding: 10px 12px; gap: 10px; cursor: pointer; transition: opacity 0.15s; }
    .sprint-card.done { opacity: 0.4; }
    .sprint-check { width: 20px; height: 20px; border-radius: 50%; border: 1.5px solid var(--border2); flex-shrink: 0; display: flex; align-items: center; justify-content: center; transition: all 0.15s; margin-top: 1px; }
    .sprint-card.done .sprint-check { background: var(--green); border-color: var(--green); }
    .sprint-check-inner { width: 7px; height: 7px; border-right: 2px solid white; border-bottom: 2px solid white; transform: rotate(45deg) translate(-1px, -1px); display: none; }
    .sprint-card.done .sprint-check-inner { display: block; }
    .sprint-card-body { flex: 1; min-width: 0; }
    .sprint-card-top { display: flex; align-items: baseline; justify-content: space-between; gap: 8px; }
    .sprint-card-name { font-size: 14px; color: var(--text); }
    .sprint-card-time { font-size: 12px; color: var(--text3); white-space: nowrap; flex-shrink: 0; }
    .sprint-progress { padding: 12px 24px; background: var(--bg2); border-bottom: 0.5px solid var(--border); display: flex; align-items: center; gap: 10px; }
    .sprint-progress-label { font-size: 12px; color: var(--text3); text-transform: uppercase; letter-spacing: 0.05em; }
    .sprint-progress-stats { display: flex; align-items: center; gap: 10px; flex: 1; }
    .sprint-progress-bar-wrap { flex: 1; height: 4px; background: var(--bg3); border-radius: 2px; overflow: hidden; }
    .sprint-progress-bar { height: 100%; background: var(--green); border-radius: 2px; transition: width 0.3s; }
    .sprint-progress-text { font-size: 13px; font-weight: 500; color: var(--text2); white-space: nowrap; }
    .sprint-time-left { font-size: 12px; color: var(--text3); white-space: nowrap; }
    .sprint-block-time { font-size: 13px; color: var(--text3); white-space: nowrap; }
    .sprint-block-divider { height: 1px; background: var(--border); margin: 16px 24px 0; }
  
    .sprint-block-hint { font-size: 11px; color: var(--text3); margin-top: 1px; }
    .sprint-done-badge { font-size: 11px; font-weight: 500; color: var(--green); background: var(--green-bg); padding: 1px 7px; border-radius: 10px; margin-left: 6px; }
  
    /* Pin indicator */

      <div class="stats-row">

    </div>

    if (days === 21) return 'every 3 weeks';

    if (days <= 45) return 'every ' + days + ' days';

  async function saveState() {
    // Debounce rapid saves: wait 300ms after last call
    if (saveDebounceTimer) clearTimeout(saveDebounceTimer);
    saveDebounceTimer = setTimeout(async () => {
      if (isSaving) return;
      isSaving = true;
      try {
        localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
      } catch (e) {
        console.error('Storage save error:', e);
      } finally {
        isSaving = false;
      }
    }, 300);
  }
  
  // ─── STATE (initialized async in init()) ───────────────────────────────────
  let state = defaultState(); // placeholder until async load
  let currentTab = 'alina';
  let overflowOpen = false;
  let dailiesOpen = true;

  // ─── CORE LOGIC ────────────────────────────────────────────────────────────
  
  function todayStr() {
    const d = new Date();
    return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');
  }
  
  function isWeekend() {
    const d = new Date().getDay();
    return d === 0 || d === 6;
  }

  function fmtMinutes(min) {
    if (min < 60) return min + 'm';
    const h = Math.floor(min / 60);
    const m = min % 60;
    return m === 0 ? h + 'h' : h + 'h ' + m + 'm';
  }
  
  function daysOverdue(task) {
    const snoozeUntil = state.snoozed && state.snoozed[task.id];
    if (snoozeUntil && Date.now() < snoozeUntil) {
      return -(snoozeUntil - Date.now()) / 86400000; // negative = not due yet
    }
    const last = state.completions[task.id] || 0;
    if (task.freq === 1) {
      // Calendar-day based: due whenever last completion was on a previous calendar day
      if (!last) return 0;
      const d = new Date(last);
      const lastDateStr = d.getFullYear() + '-' + String(d.getMonth() + 1).padStart(2, '0') + '-' + String(d.getDate()).padStart(2, '0');
      if (lastDateStr >= todayStr()) return -0.5; // done today, not due
      const today = new Date();
      const todayMidnight = new Date(today.getFullYear(), today.getMonth(), today.getDate()).getTime();
      const lastMidnight = new Date(d.getFullYear(), d.getMonth(), d.getDate()).getTime();
      return (todayMidnight - lastMidnight) / 86400000 - 1; // 0 if done yesterday, 1 if 2 days ago, etc.
    }
    const nextDue = last + task.freq * 86400000;
    return (Date.now() - nextDue) / 86400000;
  }
  
  function isDue(task) {
    if (task.oneOff) return true;
    return daysOverdue(task) >= 0;
  }

  // Learned time estimate: median of recorded actuals (3+ samples), else the static estimate
  function taskTime(task) {
    const a = (state.actualTimes || {})[task.id];
    if (!a || a.length < 3) return task.time;
    const s = [...a].sort((x,y) => x - y);
    const mid = Math.floor(s.length / 2);
    return s.length % 2 ? s[mid] : Math.round((s[mid-1] + s[mid]) / 2);
  }

  // ── Per-task timer (transient, in-memory only) ──
  let activeTimer = null;
  let timerInterval = null;

  function fmtElapsed(ms) {
    const s = Math.floor(ms / 1000);
    return Math.floor(s / 60) + ':' + String(s % 60).padStart(2, '0');
  }

  function startTimerTick() {
    clearInterval(timerInterval);
    timerInterval = setInterval(() => {
      if (!activeTimer) { clearInterval(timerInterval); return; }
      const el = document.getElementById('timerElapsed_' + activeTimer.id);
      if (el) el.textContent = '⏱ ' + fmtElapsed(Date.now() - activeTimer.startedAt);
    }, 1000);
  }

  function toggleTimer(id) {
    if (activeTimer && activeTimer.id === id) {
      const mins = Math.max(1, Math.round((Date.now() - activeTimer.startedAt) / 60000));
      activeTimer = null;
      clearInterval(timerInterval);
      render();
      openTimeModal(id, mins, 'Timer stopped — confirm or adjust, or discard.');
      return;
    }
    activeTimer = { id, startedAt: Date.now() };
    startTimerTick();
    render();
    showToast('Timer running — stop it or check off to log time');
  }

  function recordTime(id, mins) {
    if (!state.actualTimes) state.actualTimes = {};
    if (!state.actualTimes[id]) state.actualTimes[id] = [];
    state.actualTimes[id].push(mins);
    if (state.actualTimes[id].length > 10) state.actualTimes[id].shift();
    saveState();
  }

  let timeModalTaskId = null;

  function openTimeModal(id, minutes, hint) {
    const t = getAllTasks().find(x => x.id === id);
    if (!t) return;
    timeModalTaskId = id;
    document.getElementById('timeModalTask').textContent = t.name;
    document.getElementById('timeModalHint').textContent = hint || 'Logged times sharpen the estimate used for budgeting (median of last 10, needs 3+).';
    document.getElementById('timeModalMinutes').value = minutes || '';
    document.getElementById('timeModal').classList.add('open');
  }

  function closeTimeModal() {
    document.getElementById('timeModal').classList.remove('open');
    timeModalTaskId = null;
  }

  function saveTimeEntry() {
    const mins = parseInt(document.getElementById('timeModalMinutes').value);
    if (!mins || mins < 1 || mins > 600) { showToast('Enter minutes between 1 and 600'); return; }
    const id = timeModalTaskId;
    closeTimeModal();
    recordTime(id, mins);
    render();
    showToast('⏱ ' + mins + 'm logged');
  }

  function inSeason(task) {
    const months = (state.taskMonths || {})[task.id];
    if (!months || !months.length || months.length >= 12) return true;
    return months.includes(new Date().getMonth() + 1);
  }
  
  function autoZone(date) {
    const day = (date || new Date()).getDate();
    return Math.min(Math.ceil(day / 7), 5); // 1–7→1 … 22–28→4, 29+→5
  }

  function effectiveZone() {
    return (state.zoneMode || 'auto') === 'auto' ? autoZone() : state.zone;
  }

  function scoreTaskParts(task, zone) {
    const zoneRooms = ZONE_ROOMS[zone] || [];
    const inZone = zoneRooms.some(r => task.room.includes(r) || r.includes(task.room));
    const overdue = daysOverdue(task);
    const overdueRatio = overdue / task.freq;
    const overdueWeight = (state.mode === 'catchup') ? 0.8 : 0.5;
    const starvation = (state.starvation || {})[task.id] || 0;
    const parts = {
      base: task.freq,
      cat: task.cat ? -0.5 : 0,
      zone: inZone ? -2 : 0,
      overdue: -Math.min(overdueRatio * task.freq * overdueWeight, task.freq * 0.8),
      starvation: -Math.min(starvation * 0.3, task.freq * 0.15),
      flagged: (state.flaggedIds || []).includes(task.id) ? -50 : 0,
      overdueDays: overdue,
      starvationDays: starvation,
      jitter: task.freq > 60,
    };
    parts.total = parts.base + parts.cat + parts.zone + parts.overdue + parts.starvation + parts.flagged;
    return parts;
  }

  function scoreTask(task, zone) {
    let score = scoreTaskParts(task, zone).total;
    if (task.freq > 60) score += (Math.random() - 0.5) * 2;
    return score;
  }
  
  function getDueTasks(owner) {
    return getAllTasks()
      .filter(t => {
        if (!isDue(t)) return false;
        if (!inSeason(t)) return false;
        if (owner === 'alina') return t.owner === 'alina' || t.owner === 'either';
        if (owner === 'bob')   return t.owner === 'bob';
        return true;
      })
      .sort((a,b) => scoreTask(a, effectiveZone()) - scoreTask(b, effectiveZone()));
  }
  
  function getDailies() {
    return getAllTasks().filter(t =>
      t.freq === 1 &&
      !t.oneOff &&
      isDue(t) &&
      inSeason(t) &&
      (t.owner === 'alina' || t.owner === 'either')
    ).sort((a,b) => scoreTask(a, effectiveZone()) - scoreTask(b, effectiveZone()));
  }
  
  function getTaskTier(task) {
    if (task.freq <= 7)  return 'A';
    if (task.freq <= 60) return 'B';
    return 'C';
  }

  function dealHand() {
    const today = todayStr();
    if (state.handDate === today && state.hand) return;

    // Vacation mode: keep the existing hand, skip dealing and starvation ticks
    if (state.paused) {
      if (!state.hand) { state.hand = []; state.handDate = today; saveState(); }
      return;
    }

    const preferTier = state._dealPreferTier || null;
    if (preferTier) delete state._dealPreferTier;

    const mode = state.mode || 'maintenance';
    const allTasks = getAllTasks();
    const pinned = (state.pinnedIds || []).filter(id => allTasks.find(t => t.id === id));
    const pinnedSet = new Set(pinned);

    // Laundry: pick exactly one "what to wash" task per day (most overdue by score);
    // suppress the daily process steps if nothing is due to wash.
    const LAUNDRY_LOAD_IDS = new Set(['lroom_myclothes','lroom_towels','lroom_microfiber','k_towels']);
    const LAUNDRY_PROCESS_IDS = new Set(['l_start','l_dryer','l_fold','l_put_away']);
    const pinnedLaundryLoad = pinned.some(id => LAUNDRY_LOAD_IDS.has(id));
    const completedLaundryLoadToday = allTasks.some(t => LAUNDRY_LOAD_IDS.has(t.id) && wasCompletedToday(t));
    const hasLaundryToday = pinnedLaundryLoad || completedLaundryLoadToday;
    const dueLaundryLoads = allTasks
      .filter(t => LAUNDRY_LOAD_IDS.has(t.id) && (isDue(t) || (state.flaggedIds || []).includes(t.id)) && !pinnedSet.has(t.id) && (t.owner === 'alina' || t.owner === 'either'))
      .sort((a,b) => scoreTask(a, effectiveZone()) - scoreTask(b, effectiveZone()));
    // Don't assign another laundry load if one was already completed today or is pinned
    const laundryLoadId = (!hasLaundryToday && dueLaundryLoads.length > 0) ? dueLaundryLoads[0].id : null;

    const dailyIds = getDailies().map(t => t.id)
      .filter(id => !pinnedSet.has(id))
      .filter(id => laundryLoadId !== null || hasLaundryToday || !LAUNDRY_PROCESS_IDS.has(id));

    // Always-assign: c_fountain bypasses all tiers when due; laundry load slot
    const ALWAYS_ASSIGN_IDS = ['c_fountain'];
    const alwaysAssigned = [];
    ALWAYS_ASSIGN_IDS.forEach(id => {
      if (pinnedSet.has(id) || dailyIds.includes(id)) return;
      const task = allTasks.find(t => t.id === id);
      if (task && isDue(task) && inSeason(task)) alwaysAssigned.push(id);
    });
    if (laundryLoadId && !pinnedSet.has(laundryLoadId)) alwaysAssigned.push(laundryLoadId);
    const alwaysAssignedSet = new Set(alwaysAssigned);

    // Scored pool of all due non-daily tasks (laundry load tasks handled separately above)
    // Flagged tasks bypass the isDue check so they always surface even if not yet overdue
    const flaggedSet = new Set(state.flaggedIds || []);
    const nonDailyPool = allTasks.filter(t =>
      t.freq > 1 &&
      (isDue(t) || flaggedSet.has(t.id)) &&
      inSeason(t) &&
      (t.owner === 'alina' || t.owner === 'either') &&
      !pinnedSet.has(t.id) &&
      !alwaysAssignedSet.has(t.id) &&
      !LAUNDRY_LOAD_IDS.has(t.id)
    ).sort((a,b) => scoreTask(a, effectiveZone()) - scoreTask(b, effectiveZone()));

    // If a tier preference was requested, float that tier to the top while keeping score order within each group
    const pool = preferTier
      ? [...nonDailyPool.filter(t => getTaskTier(t) === preferTier), ...nonDailyPool.filter(t => getTaskTier(t) !== preferTier)]
      : nonDailyPool;

    const HEAVY_THRESHOLD = 15;
    const HEAVY_MAX = 2;
    const budget = isWeekend() ? state.budgetWeekend : state.budgetWeekday;
    const completedNonDailyTime = allTasks.filter(t => t.freq > 1 && wasCompletedToday(t))
      .reduce((s, t) => s + taskTime(t), 0);
    const alwaysAssignedTime = alwaysAssigned.reduce((s, id) => {
      const t = allTasks.find(t => t.id === id);
      return s + (t ? taskTime(t) : 0);
    }, 0);

    let timeUsed = completedNonDailyTime + alwaysAssignedTime;
    let heavyCount = 0;
    const selected = [];

    // Flagged tasks bypass the budget and heavy caps entirely — flag means "always in hand"
    const flaggedTasks = pool.filter(t => flaggedSet.has(t.id));
    const fillPool = pool.filter(t => !flaggedSet.has(t.id));
    flaggedTasks.forEach(t => {
      const tt = taskTime(t);
      selected.push(t);
      timeUsed += tt;
      if (tt > HEAVY_THRESHOLD) heavyCount++;
    });

    if (mode === 'byfreq') {
      // Sort by raw frequency; shuffle within same-freq for variety; honour tier preference if set
      const freqPool = [...fillPool].sort((a, b) => {
        if (preferTier) {
          const aMatch = getTaskTier(a) === preferTier ? 0 : 1;
          const bMatch = getTaskTier(b) === preferTier ? 0 : 1;
          if (aMatch !== bMatch) return aMatch - bMatch;
        }
        if (a.freq !== b.freq) return a.freq - b.freq;
        return Math.random() - 0.5;
      });
      for (const task of freqPool) {
        const tt = taskTime(task);
        const isHeavy = tt > HEAVY_THRESHOLD;
        if (isHeavy && heavyCount >= HEAVY_MAX) continue;
        if (timeUsed >= budget) break;
        if (timeUsed + tt > budget && selected.length > 0) break;
        selected.push(task);
        timeUsed += tt;
        if (isHeavy) heavyCount++;
      }
    } else {
      // Keep Up / Catch Up: score-sorted pool fills budget (algorithm decides)
      // Score already encodes the mode difference via overdueWeight (0.5 vs 0.8)
      for (const task of fillPool) {
        const tt = taskTime(task);
        const isHeavy = tt > HEAVY_THRESHOLD;
        if (isHeavy && heavyCount >= HEAVY_MAX) continue;
        if (timeUsed >= budget) break;
        if (timeUsed + tt > budget && selected.length > 0) break;
        selected.push(task);
        timeUsed += tt;
        if (isHeavy) heavyCount++;
      }
    }

    const newHandIds = new Set([...pinned, ...dailyIds, ...alwaysAssigned, ...selected.map(t => t.id)]);
    allTasks.forEach(t => {
      if (wasCompletedToday(t) && !newHandIds.has(t.id)) newHandIds.add(t.id);
    });
    // In-progress tasks carry into every new hand until finished
    Object.keys(state.inProgress || {}).forEach(id => {
      if (allTasks.find(t => t.id === id)) newHandIds.add(id);
    });
    state.hand = [...newHandIds];
    state.handDate = today;

    // Starvation: tick once per calendar day
    if (!state.starvation) state.starvation = {};
    if (state.starvationDate !== today) {
      state.starvationDate = today;
      const handSet = new Set(state.hand);
      allTasks.forEach(t => {
        if (isDue(t) && inSeason(t) && !handSet.has(t.id)) {
          state.starvation[t.id] = (state.starvation[t.id] || 0) + 1;
        } else if (handSet.has(t.id)) {
          state.starvation[t.id] = 0;
        }
      });
    }

    saveState();
  }
  
  function getHandTasks() {
    dealHand();
    const handTasks = state.hand.map(id => getAllTasks().find(t => t.id === id)).filter(Boolean);
    // Also include any tasks completed today that aren't already in the hand
    const handIds = new Set(state.hand);
    const completedToday = getAllTasks().filter(t =>
      !handIds.has(t.id) &&
      (t.owner === 'alina' || t.owner === 'either') &&
      wasCompletedToday(t)
    );
    return [...handTasks, ...completedToday];
  }
  
  function getOverflowTasks() {
    dealHand();
    // Flagged tasks count as due here so "+ more" can surface them even before their due date
    const flaggedSet = new Set(state.flaggedIds || []);
    const due = getDueTasks('alina');
    const dueIds = new Set(due.map(t => t.id));
    const flaggedNotDue = getAllTasks()
      .filter(t =>
        flaggedSet.has(t.id) && !dueIds.has(t.id) &&
        inSeason(t) &&
        (t.owner === 'alina' || t.owner === 'either')
      );
    return [...flaggedNotDue, ...due].filter(t => t.freq > 1 && !state.hand.includes(t.id));
  }
  
  function getNotDueTasks() {
    return getAllTasks()
      .filter(t =>
        (t.owner === 'alina' || t.owner === 'either') &&
        !isDue(t) &&
        inSeason(t) &&
        !state.hand.includes(t.id)
      )
      .sort((a,b) => {
        const aNext = (state.completions[a.id] || 0) + a.freq * 86400000;
        const bNext = (state.completions[b.id] || 0) + b.freq * 86400000;
        return aNext - bNext;
      });
  }
  
  function avgRealFreq(taskId) {
    const h = (state.completionHistory || {})[taskId];
    if (!h || h.length < 2) return null;
    const sorted = [...h].sort((a, b) => a - b);
    let total = 0;
    for (let i = 1; i < sorted.length; i++) total += sorted[i] - sorted[i-1];
    return Math.round((total / (sorted.length - 1)) / 86400000);
  }
  
  function buildActivityLog() {
    const allTasks = getAllTasks();
    const history = state.completionHistory || {};
    const days = [];
    for (let i = 0; i < 7; i++) {
      const d = new Date();
      d.setDate(d.getDate() - i);
      const ds = d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');
      const label = i === 0 ? 'Today' : d.toLocaleDateString('en-US', {weekday:'long', month:'short', day:'numeric'});
      days.push({ ds, label, tasks: [] });
    }
    const buckets = {};
    days.forEach(day => { buckets[day.ds] = day; });
    allTasks.forEach(t => {
      (history[t.id] || []).forEach(ts => {
        const d = new Date(ts);
        const ds = d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');
        if (buckets[ds]) buckets[ds].tasks.push(t.name);
      });
    });
    return days;
  }
  
  function wasCompletedToday(task) {
    const last = state.completions[task.id] || 0;
    if (!last) return false;
    const d = new Date(last);
    const s = d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');
    return s === todayStr();
  }
  
  let _undoBuffer = null;

  function completeTask(id) {
    const task = getAllTasks().find(t => t.id === id);
    if (!task) return;
    const prev = state.completions[id] || 0;
    const prevOverdue = (Date.now() - (prev + task.freq * 86400000)) / 86400000;
    state.completions[id] = Date.now();
    if (state.flaggedIds) state.flaggedIds = state.flaggedIds.filter(x => x !== id);
    if (!state.completionHistory) state.completionHistory = {};
    if (!state.completionHistory[id]) state.completionHistory[id] = [];
    const _alreadyToday = state.completionHistory[id].some(ts => {
      const d = new Date(ts);
      return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0') === todayStr();
    });
    if (!_alreadyToday) {
      state.completionHistory[id].push(Date.now());
      if (state.completionHistory[id].length > 100) state.completionHistory[id].shift();
    }
    _undoBuffer = { id, prev, hadHistoryToday: _alreadyToday, wasInProgress: (state.inProgress || {})[id] || null };
    // Timer running on this task: stop it and let the modal confirm the entry
    let _timedMins = null;
    if (activeTimer && activeTimer.id === id) {
      _timedMins = Math.max(1, Math.round((Date.now() - activeTimer.startedAt) / 60000));
      activeTimer = null;
      clearInterval(timerInterval);
    }
    // Clear snooze / in-progress on completion
    if (state.snoozed) delete state.snoozed[id];
    if (state.inProgress) delete state.inProgress[id];
    // Auto-unpin on completion
    if (state.pinnedIds && state.pinnedIds.includes(id)) {
      state.pinnedIds = state.pinnedIds.filter(p => p !== id);
    }
    // Remove one-off tasks entirely after completion
    if (task.oneOff && state.customTasks && state.customTasks[id]) {
      delete state.customTasks[id];
      state.hand = (state.hand || []).filter(h => h !== id);
    }
    saveNow();
    render();
    if (task.oneOff) showToast('Done!');
    else showUndoToast(id);
    if (_timedMins !== null) openTimeModal(id, _timedMins, 'Done! Confirm the timed entry, adjust it, or discard.');
  }

  function undoComplete() {
    if (!_undoBuffer) return;
    const { id, prev, hadHistoryToday, wasInProgress } = _undoBuffer;
    _undoBuffer = null;
    if (prev) state.completions[id] = prev;
    else delete state.completions[id];
    if (wasInProgress) {
      if (!state.inProgress) state.inProgress = {};
      state.inProgress[id] = wasInProgress;
    }
    if (!hadHistoryToday && state.completionHistory && state.completionHistory[id]) {
      const today = todayStr();
      state.completionHistory[id] = state.completionHistory[id].filter(ts => {
        const d = new Date(ts);
        return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0') !== today;
      });
    }
    saveNow();
    render();
    showToast('Undone');
  }

  function completeEarlier(id, daysAgo) {
    const task = getAllTasks().find(t => t.id === id);
    if (!task) return;
    const d = new Date();
    d.setDate(d.getDate() - daysAgo);
    const ts = new Date(d.getFullYear(), d.getMonth(), d.getDate(), 12).getTime();
    state.completions[id] = ts;
    if (!state.completionHistory) state.completionHistory = {};
    if (!state.completionHistory[id]) state.completionHistory[id] = [];
    state.completionHistory[id].push(ts);
    state.completionHistory[id].sort((a,b) => a - b);
    if (state.completionHistory[id].length > 100) state.completionHistory[id].shift();
    if (state.starvation) state.starvation[id] = 0;
    if (state.snoozed) delete state.snoozed[id];
    if (state.flaggedIds) state.flaggedIds = state.flaggedIds.filter(x => x !== id);
    if (!isDue(task)) {
      state.hand = (state.hand || []).filter(h => h !== id);
      if (state.pinnedIds) state.pinnedIds = state.pinnedIds.filter(p => p !== id);
    }
    saveNow();
    render();
    showToast('Marked done ' + (daysAgo === 1 ? 'yesterday' : daysAgo + ' days ago'));
  }
  
  function flagTask(id) {
    if (!state.flaggedIds) state.flaggedIds = [];
    if (!state.flaggedIds.includes(id)) state.flaggedIds.push(id);
    saveState(); render();
  }
  function unflagTask(id) {
    if (!state.flaggedIds) return;
    state.flaggedIds = state.flaggedIds.filter(x => x !== id);
    saveState(); render();
  }
  
  function toggleInProgress(id) {
    if (!state.inProgress) state.inProgress = {};
    if (state.inProgress[id]) {
      delete state.inProgress[id];
      showToast('No longer in progress');
    } else {
      state.inProgress[id] = Date.now();
      showToast('Marked in progress — it\'ll stay in your hand until done');
    }
    saveState();
    render();
  }

  function uncompleteTask(id) {
    const task = getAllTasks().find(t => t.id === id);
    if (!task) return;
    state.completions[id] = Date.now() - task.freq * 86400000 - 3600000;
    if (state.completionHistory && state.completionHistory[id]) {
      const today = todayStr();
      state.completionHistory[id] = state.completionHistory[id].filter(ts => {
        const d = new Date(ts);
        return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0') !== today;
      });
    }
    saveState();
    render();
  }

  function toggleComplete(id) {
    const task = getAllTasks().find(t => t.id === id);
    if (!task) return;
    if (wasCompletedToday(task)) uncompleteTask(id);
    else completeTask(id);
  }
  
  function swapTask(id) {
    const overflow = getOverflowTasks();
    if (!overflow.length) { showToast('Nothing else available'); return; }
    const idx = state.hand.indexOf(id);
    if (idx >= 0) state.hand[idx] = overflow[0].id;
    saveState();
    render();
    showToast('Swapped!');
  }
  
  function removeFromHand(id) {
    state.hand = (state.hand || []).filter(h => h !== id);
    if (state.pinnedIds) state.pinnedIds = state.pinnedIds.filter(p => p !== id);
    if (state.inProgress) delete state.inProgress[id]; // else it returns on next deal
    saveState();
    render();
  }
  
  function loadPresetDueOnly(preset) {
    const allIds = preset === 'guest' ? state.guestHand :
                   preset === 'reset' ? state.resetHand :
                   state.goingOutHand;
    if (!allIds || !allIds.length) return;
    const combined = [...getAllTasks(), ...FULL_RESET_TASKS, ...GOING_OUT_TASKS];
    const dueIds = allIds.filter(id => {
      const task = combined.find(t => t.id === id);
      return task && isDue(task);
    });
    if (!dueIds.length) { showToast('No due tasks in this preset'); return; }
    state.hand = [...dueIds];
    state.handDate = todayStr();
    state.guestHand = null;
    state.resetHand = null;
    state.goingOutHand = null;
    saveState();
    switchTab('sprint');
  }
  
  function addMore(tier = 'all') {
    const overflow = getOverflowTasks();
    const filtered = tier === 'all' ? overflow : overflow.filter(t => getTaskTier(t) === tier);
    const toAdd = filtered.slice(0, 3).map(t => t.id);
    if (!toAdd.length) { showToast(tier === 'all' ? 'Nothing more due' : 'Nothing more due in tier ' + tier); return; }
    state.hand = [...state.hand, ...toAdd];
    saveState();
    render();
    showToast('Added ' + toAdd.length + ' more task' + (toAdd.length>1?'s':''));
  }
  
  function pinTask(id) {
    if (!state.pinnedIds) state.pinnedIds = [];
    if (state.pinnedIds.includes(id)) return;
    state.pinnedIds.push(id);
    // If task isn't in hand, add it and bump lowest-priority non-pinned non-daily
    if (!state.hand.includes(id)) {
      state.hand.push(id);
      // Check if we're over cap for non-daily tasks
      const dailyIds = getDailies().map(t => t.id);
      const nonDailyInHand = state.hand.filter(hid => !dailyIds.includes(hid));
      const pinnedSet = new Set(state.pinnedIds);
      const nonPinnedNonDaily = nonDailyInHand.filter(hid => !pinnedSet.has(hid));
      if (nonPinnedNonDaily.length > 0) {
        // Remove lowest priority non-pinned non-daily (last in the sorted list)
        const bumpId = nonPinnedNonDaily[nonPinnedNonDaily.length - 1];
        state.hand = state.hand.filter(hid => hid !== bumpId);
      }
    }
    saveState();
    render();
    showToast('Pinned');
  }
  
  function unpinTask(id) {
    if (!state.pinnedIds) return;
    state.pinnedIds = state.pinnedIds.filter(p => p !== id);
    saveState();
    render();
    showToast('Unpinned');
  }
  
  function togglePin(id) {
    if (state.pinnedIds && state.pinnedIds.includes(id)) {
      unpinTask(id);
    } else {
      pinTask(id);
    }
  }
  
  function redealHand(tier = null) {
    // Preserve pins across redeal
    state.hand = null;
    state.handDate = null;
    if (tier) state._dealPreferTier = tier;
    saveState();
    render();
    showToast(tier ? 'Redealt (tier ' + tier + ' priority)' : 'Hand redealt');
  }

  function setMode(mode) {
    state.mode = mode;
    state.hand = null;
    state.handDate = null;
    saveState();
    render();
    const labels = { maintenance: 'Keep up', catchup: 'Catch up', byfreq: 'By freq' };
    showToast(labels[mode] || mode);
  }
  
  function setLastDone(id, dateStr) {
    if (!dateStr) return;
    const d = new Date(dateStr + 'T12:00:00');
    if (isNaN(d)) return;
    state.completions[id] = d.getTime();
    state.hand = null;
    saveState();
    render();
    showToast('Last done updated');
  }
  
  // ─── RENDER ────────────────────────────────────────────────────────────────
  
  function render() {
    if (currentTab === 'alina') renderAlina();
    else if (currentTab === 'sprint') renderSprint();
    else if (currentTab === 'manage') renderManage();
    else if (currentTab === 'presets') renderPresets();
    else if (currentTab === 'stats') renderStats();
    else if (currentTab === 'settings') renderSettings();
  }
  
  function renderAlina() {
    // Sync zone selector (auto label shows this week's zone)
    const autoOpt = document.getElementById('zoneAutoOption');
    if (autoOpt) autoOpt.textContent = 'Auto — Zone ' + autoZone() + ' this week';
    const zoneSel = document.getElementById('zoneSelect');
    if (zoneSel) zoneSel.value = (state.zoneMode || 'auto') === 'auto' ? 'auto' : String(state.zone);

    // Sync active mode button
    ['maintenance', 'catchup', 'byfreq'].forEach(m => {
      const btn = document.getElementById('modeBtn-' + m);
      if (btn) btn.classList.toggle('active', (state.mode || 'maintenance') === m);
    });

    const hand = getHandTasks();
    const doneCount = hand.filter(t => wasCompletedToday(t)).length;
    const totalMin = hand.reduce((s,t) => s + taskTime(t), 0);

    const leftMin = hand.filter(t => !wasCompletedToday(t)).reduce((s,t) => s + taskTime(t), 0);
    document.getElementById('progressText').textContent = doneCount + ' / ' + hand.length + ' done';
    document.getElementById('progressBar').style.width = hand.length ? Math.round(doneCount/hand.length*100) + '%' : '0%';
    document.getElementById('totalTime').textContent = '⏱ ~' + fmtMinutes(leftMin) + ' left';
  
    const dailyIds = getDailies().map(t => t.id);
    const dailies = hand.filter(t => dailyIds.includes(t.id));
    const capped  = hand.filter(t => !dailyIds.includes(t.id));
    const overflow = getOverflowTasks();
    const notDue = getNotDueTasks();
  
    let html = '';

    if (state.paused) {
      const since = state.pausedAt ? new Date(state.pausedAt).toLocaleDateString('en-US', {month:'short', day:'numeric'}) : '';
      html += '<div class="section" style="margin-top:12px">' +
        '<div style="background:var(--amber-bg);border:0.5px solid var(--amber);border-radius:var(--radius);padding:12px 16px;display:flex;justify-content:space-between;align-items:center;gap:10px">' +
          '<div><div style="font-weight:600;color:var(--amber)">&#9208; Vacation mode</div>' +
          '<div style="font-size:12px;color:var(--text3)">Paused' + (since ? ' since ' + since : '') + ' &mdash; no new hands, due dates shift when you\'re back.</div></div>' +
          '<button class="add-btn" style="background:var(--amber);flex-shrink:0" onclick="resumeApp()">I\'m back</button>' +
        '</div></div>';
    }

    if (dailies.length) {
      const dailiesUndone = dailies.filter(t => !wasCompletedToday(t));
      const dailyLeftMin = dailiesUndone.reduce((s,t) => s + taskTime(t), 0);
      html += '<div class="section"><div class="section-label">' +
        '<button class="section-label-btn' + (dailiesOpen ? ' open' : '') + '" onclick="toggleDailies()">' +
          '<svg width="10" height="10" viewBox="0 0 12 12" fill="none"><path d="M4 2l4 4-4 4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>' +
          'Daily Tasks (' + dailiesUndone.length + ')' +
        '</button>' +
        '<span class="section-label-time">⏱ ~' + fmtMinutes(dailyLeftMin) + ' remaining</span>' +
      '</div>' +
      '<div id="dailiesList" style="display:' + (dailiesOpen ? 'block' : 'none') + '">';
      dailiesUndone.forEach(t => html += renderCard(t, false));
      html += '</div></div>';
    }

    if (capped.length) {
      const cappedUndone = capped.filter(t => !wasCompletedToday(t));
      const otherLeftMin = cappedUndone.reduce((s,t) => s + taskTime(t), 0);
      html += '<div class="section"><div class="section-label">' +
        '<button class="section-label-btn' + (otherTasksOpen ? ' open' : '') + '" id="otherTasksToggle" onclick="toggleOtherTasks()">' +
          '<svg width="10" height="10" viewBox="0 0 12 12" fill="none"><path d="M4 2l4 4-4 4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>' +
          'Other Tasks (' + cappedUndone.length + ')' +
        '</button>' +
        '<span class="section-label-time">⏱ ~' + fmtMinutes(otherLeftMin) + ' remaining</span>' +
      '</div>' +
      '<div id="otherTasksList" style="display:' + (otherTasksOpen ? 'block' : 'none') + '">';
      cappedUndone.forEach(t => html += renderCard(t, true));
      html += '</div></div>';
    }

    const completedTasks = hand.filter(t => wasCompletedToday(t));
    if (completedTasks.length) {
      html += '<div class="overflow-section" style="margin-top:8px">' +
        '<button class="overflow-toggle' + (completedOpen ? ' open' : '') + '" id="completedToggle" onclick="toggleCompleted()">' +
          '<svg width="12" height="12" viewBox="0 0 12 12" fill="none"><path d="M4 2l4 4-4 4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>' +
          'Completed (' + completedTasks.length + ')' +
        '</button>' +
        '<div id="completedList" style="display:' + (completedOpen ? 'block' : 'none') + '">' +
        '<div class="section" style="margin-top:8px">';
      completedTasks.forEach(t => html += renderCard(t, false));
      html += '</div></div></div>';
    }
  
    if (overflow.length || notDue.length) {
      const totalBackup = overflow.length + notDue.length;
      html += '<div class="overflow-section" style="margin-top:12px">';
      if (overflow.length) {
        html += '<div class="more-btn-row">' +
          '<button class="more-btn" onclick="addMore()">+ Give me more (' + overflow.length + ' due)</button>' +
          '<div class="tier-pills">' +
            '<button class="tier-pill" onclick="addMore(\'A\')" title="Operational (≤7d)">A</button>' +
            '<button class="tier-pill" onclick="addMore(\'B\')" title="Maintenance (8–60d)">B</button>' +
            '<button class="tier-pill" onclick="addMore(\'C\')" title="Deep clean (>60d)">C</button>' +
          '</div>' +
        '</div>';
      }
      html += '<button class="overflow-toggle' + (overflowOpen ? ' open' : '') + '" id="overflowToggle" onclick="toggleOverflow()">' +
          '<svg width="12" height="12" viewBox="0 0 12 12" fill="none"><path d="M4 2l4 4-4 4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>' +
          'Backup list (' + totalBackup + ')' +
        '</button>' +
        '<div id="overflowList" style="display:' + (overflowOpen ? 'block' : 'none') + '">';
      if (overflow.length) {
        html += '<div class="section" style="margin-top:8px"><div class="section-label">Due / overdue</div>';
        overflow.forEach(t => html += renderCard(t, true));
        html += '</div>';
      }
      if (notDue.length) {
        html += '<div class="section" style="margin-top:8px"><div class="section-label">Not due yet</div>';
        notDue.forEach(t => html += renderCard(t, false));
        html += '</div>';
      }
      html += '</div></div>';
    }
  
    if (!hand.length && !overflow.length) {
      html = '<div class="empty">Nothing due — all clear!</div>';
    }
  
    // Quick-log: record a completion for anything you did that isn't in the hand
    html += '<div class="section" style="margin-top:12px">' +
      '<button class="more-btn" style="margin-bottom:' + (quickLogOpen ? '8px' : '0') + '" onclick="toggleQuickLog()">' + (quickLogOpen ? '&minus; Log something else' : '+ Log something else I did') + '</button>';
    if (quickLogOpen) {
      html += '<input class="search-input" id="quickLogInput" style="width:100%" placeholder="&#128269; Search any task&hellip;" value="' + quickLogQuery.replace(/"/g,'&quot;') + '" oninput="quickLogQuery=this.value;renderQuickLogResults()">' +
        '<div id="quickLogResults" style="margin-top:8px"></div>';
    }
    html += '</div>';

    html += '<div class="bottom-pad"></div>';
    document.getElementById('alinaTaskList').innerHTML = html;
    if (quickLogOpen) renderQuickLogResults();
  }

  let quickLogOpen = false;
  let quickLogQuery = '';

  function toggleQuickLog() {
    quickLogOpen = !quickLogOpen;
    if (!quickLogOpen) quickLogQuery = '';
    renderAlina();
    if (quickLogOpen) {
      const inp = document.getElementById('quickLogInput');
      if (inp) inp.focus();
    }
  }

  function renderQuickLogResults() {
    const el = document.getElementById('quickLogResults');
    if (!el) return;
    const q = quickLogQuery.trim().toLowerCase();
    if (q.length < 2) { el.innerHTML = '<div style="font-size:12px;color:var(--text3);padding:4px 2px">Type to search all tasks &mdash; logging here doesn\'t touch today\'s hand.</div>'; return; }
    const matches = getAllTasks()
      .filter(t => !t.oneOff && (t.name.toLowerCase().includes(q) || t.room.toLowerCase().includes(q)))
      .slice(0, 6);
    if (!matches.length) { el.innerHTML = '<div style="font-size:12px;color:var(--text3);padding:4px 2px">No tasks match.</div>'; return; }
    el.innerHTML = matches.map(t => {
      const done = wasCompletedToday(t);
      return '<div class="sprint-card' + (done ? ' done' : '') + '" onclick="quickLogComplete(\'' + t.id + '\')" style="margin:0 0 6px">' +
        '<div class="sprint-check"><div class="sprint-check-inner"></div></div>' +
        '<div class="sprint-card-body"><div class="sprint-card-top">' +
          '<span class="sprint-card-name">' + t.name + '</span>' +
          '<span class="sprint-card-time">' + t.room + (done ? ' &middot; done today' : '') + '</span>' +
        '</div></div>' +
      '</div>';
    }).join('');
  }

  function quickLogComplete(id) {
    const t = getAllTasks().find(x => x.id === id);
    if (!t) return;
    if (wasCompletedToday(t)) { showToast('Already logged today'); return; }
    if (state.starvation) state.starvation[id] = 0;
    completeTask(id);
  }

  function renderCard(task, canSwap) {
    const isDone = wasCompletedToday(task);
    const overdue = task.oneOff ? 0 : daysOverdue(task);

    const last = state.completions[task.id] || 0;
    const lastDate = last ? new Date(last).toLocaleDateString('en-US', {month:'short', day:'numeric', year:'numeric'}) : 'never';
    const nextDue = new Date(last + task.freq * 86400000);

    let overdueHtml = '';
    if (!isDone && !task.oneOff) {
      if (overdue >= 1) overdueHtml = '<span class="task-overdue">' + Math.floor(overdue) + 'd overdue</span>';
      else if (overdue >= 0) overdueHtml = '<span class="task-overdue">due today</span>';
      else {
        const daysUntil = Math.ceil(-overdue);
        overdueHtml = '<span class="task-notdue">in ' + daysUntil + 'd</span>';
      }
    }
  
    const snoozeUntil = state.snoozed && state.snoozed[task.id];
    const isSnoozed = snoozeUntil && Date.now() < snoozeUntil;
    if (!isDone && isSnoozed) {
      const snoozeDate = new Date(snoozeUntil).toLocaleDateString('en-US', {month:'short', day:'numeric'});
      overdueHtml = '<span class="task-snoozed">snoozed until ' + snoozeDate + '</span>';
    }

    const isInProgress = !!(state.inProgress && state.inProgress[task.id]);
    const inProgressBadge = !isDone && isInProgress ? '<span class="task-snoozed">&#9203; in progress</span>' : '';

    const cad = task.oneOff ? null : cadenceInfo(task);
    const cadHtml = cad ? '<span style="font-size:11px;color:' + cad.color + '" title="real cadence vs target ' + task.freq + 'd">~' + cad.real + 'd real</span>' : '';
  
    const ownerHtml = task.owner === 'bob' ? '<span class="owner-badge owner-bob">Bob</span>' : '';
    const isPinned = state.pinnedIds && state.pinnedIds.includes(task.id);
    const pinBadge = isPinned && !task.oneOff ? '<span class="pin-badge">&#128204;</span>' : '';
    const oneOffBadge = task.oneOff ? '<span class="oneoff-badge">once</span>' : '';
    const swapBtn = canSwap && !isDone && !isPinned && !task.oneOff ? '<button class="task-btn swap-btn" onclick="event.stopPropagation();swapTask(\'' + task.id + '\')">swap</button>' : '';
    const undoBtn = isDone && !task.oneOff ? '<button class="task-btn" onclick="event.stopPropagation();uncompleteTask(\'' + task.id + '\')">undo</button>' : '';
    const pinBtn = !isDone && !task.oneOff ? '<button class="task-btn pin-btn' + (isPinned ? ' pinned' : '') + '" onclick="event.stopPropagation();togglePin(\'' + task.id + '\')">' + (isPinned ? 'unpin' : 'pin') + '</button>' : '';
    const removeBtn = !isDone ? '<button class="task-btn remove-btn" onclick="event.stopPropagation();removeFromHand(\'' + task.id + '\')">remove</button>' : '';
    const snoozeBtn = !isDone && !isPinned && !task.oneOff ? '<button class="task-btn" onclick="event.stopPropagation();toggleSnoozePicker(\'sp_' + task.id + '\')">snooze</button>' : '';
    const earlierBtn = !isDone && !task.oneOff ? '<button class="task-btn" onclick="event.stopPropagation();toggleSnoozePicker(\'ep_' + task.id + '\')">did earlier</button>' : '';
    const whyBtn = !task.oneOff ? '<button class="task-btn" onclick="event.stopPropagation();showWhy(\'' + task.id + '\')" title="Why was this dealt?">why?</button>' : '';
    const timerRunning = activeTimer && activeTimer.id === task.id;
    const timerBtn = !isDone ? (timerRunning
      ? '<button class="task-btn" style="color:var(--green);border-color:var(--green)" onclick="event.stopPropagation();toggleTimer(\'' + task.id + '\')">stop ⏱</button>'
      : '<button class="task-btn" onclick="event.stopPropagation();toggleTimer(\'' + task.id + '\')">⏱ time it</button>') : '';
    const timerChip = timerRunning ? '<span id="timerElapsed_' + task.id + '" style="font-size:12px;font-weight:600;color:var(--green)">⏱ ' + fmtElapsed(Date.now() - activeTimer.startedAt) + '</span>' : '';
    const startedBtn = !isDone && !task.oneOff ? '<button class="task-btn" style="' + (isInProgress ? 'color:var(--amber);border-color:var(--amber);background:var(--amber-bg)' : '') + '" onclick="event.stopPropagation();toggleInProgress(\'' + task.id + '\')">' + (isInProgress ? 'in progress ✓' : 'started…') + '</button>' : '';
    const isFlagged = (state.flaggedIds || []).includes(task.id);
    const flagBtn = !isDone && !task.oneOff ? '<button class="task-btn" onclick="event.stopPropagation();' + (isFlagged ? 'unflag' : 'flag') + 'Task(\'' + task.id + '\')" title="' + (isFlagged ? 'unflag' : 'flag') + '" style="' + (isFlagged ? '' : 'opacity:0.4') + '">🚩</button>' : '';

    const dpId = 'dp_' + task.id;
    const spId = 'sp_' + task.id;

    return '<div class="task-card ' + (isDone?'done':'') + '" id="card_' + task.id + '">' +
      '<div class="task-main" onclick="toggleComplete(\'' + task.id + '\')">' +
        '<div class="task-check"><div class="task-check-inner"></div></div>' +
        '<div class="task-body">' +
          '<div class="task-name">' + task.name + pinBadge + oneOffBadge + '</div>' +
          '<div class="task-meta">' +
            (task.room ? '<span class="task-room">' + task.room + '</span>' : '') +
            (!task.oneOff ? '<span class="task-freq">' + freqLabel(task.freq) + '</span>' : '') +
            cadHtml +
            '<span class="task-time">⏱ ' + fmtMinutes(taskTime(task)) + '</span>' +
            timerChip +
            inProgressBadge +
            overdueHtml +
            ownerHtml +
          '</div>' +
        '</div>' +
      '</div>' +
      '<div class="task-detail">' +
        (!task.oneOff ? '<div class="task-lastdone">' +
          'Last done: ' + lastDate +
          ' <button class="edit-btn" onclick="event.stopPropagation();toggleDatePicker(\'' + dpId + '\')">edit</button>' +
        '</div>' +
        '<div class="date-picker-row" id="' + dpId + '">' +
          '<input type="date" class="date-input" id="input_' + task.id + '" value="' + (last ? new Date(last).toISOString().slice(0,10) : '') + '" onclick="event.stopPropagation()">' +
          '<button class="date-save-btn" onclick="event.stopPropagation();saveDate(\'' + task.id + '\')">Save</button>' +
        '</div>' : '') +
        '<div class="snooze-picker-row" id="' + spId + '">' +
          '<span style="font-size:12px;color:var(--text3)">Snooze:</span>' +
          '<button class="snooze-day-btn" onclick="event.stopPropagation();snoozeTask(\'' + task.id + '\',1)">1d</button>' +
          '<button class="snooze-day-btn" onclick="event.stopPropagation();snoozeTask(\'' + task.id + '\',2)">2d</button>' +
          '<button class="snooze-day-btn" onclick="event.stopPropagation();snoozeTask(\'' + task.id + '\',3)">3d</button>' +
        '</div>' +
        '<div class="snooze-picker-row" id="ep_' + task.id + '">' +
          '<span style="font-size:12px;color:var(--text3)">Done:</span>' +
          '<button class="snooze-day-btn" style="border-color:var(--green);color:var(--green)" onclick="event.stopPropagation();completeEarlier(\'' + task.id + '\',1)">yesterday</button>' +
          '<button class="snooze-day-btn" style="border-color:var(--green);color:var(--green)" onclick="event.stopPropagation();completeEarlier(\'' + task.id + '\',2)">2d ago</button>' +
          '<button class="snooze-day-btn" style="border-color:var(--green);color:var(--green)" onclick="event.stopPropagation();completeEarlier(\'' + task.id + '\',3)">3d ago</button>' +
        '</div>' +
      '</div>' +
      '<div class="task-actions">' + swapBtn + startedBtn + pinBtn + snoozeBtn + earlierBtn + timerBtn + removeBtn + whyBtn + flagBtn + undoBtn + '</div>' +
    '</div>';
  }
  
  
  // ─── WHY THIS TASK? ────────────────────────────────────────────────────────

  function showWhy(id) {
    const task = getAllTasks().find(t => t.id === id);
    if (!task) return;
    const p = scoreTaskParts(task, effectiveZone());
    const fmt = v => (v > 0 ? '+' : '') + (Math.round(v * 10) / 10);

    function row(label, value, note, skip) {
      if (skip) return '';
      return '<div style="display:flex;justify-content:space-between;align-items:baseline;gap:12px;padding:8px 0;border-bottom:0.5px solid var(--border)">' +
        '<div><div style="font-size:14px;color:var(--text)">' + label + '</div>' +
        (note ? '<div style="font-size:12px;color:var(--text3)">' + note + '</div>' : '') + '</div>' +
        '<div style="font-size:15px;font-weight:600;white-space:nowrap;color:' + (value < 0 ? 'var(--green)' : 'var(--text2)') + '">' + fmt(value) + '</div>' +
      '</div>';
    }

    const overdueNote = p.overdueDays >= 1 ? Math.floor(p.overdueDays) + ' days overdue' :
                        p.overdueDays >= 0 ? 'due today' :
                        'not due for ' + Math.ceil(-p.overdueDays) + 'd (raises score)';
    let html =
      '<div style="font-size:13px;color:var(--text3);margin-bottom:4px">Lower score = dealt sooner. ' + task.name + ' scores:</div>' +
      row('Base score', p.base, 'frequency: ' + freqLabel(task.freq), false) +
      row('Overdue', p.overdue, overdueNote + ' &middot; capped at &minus;' + (task.freq * 0.8), p.overdue === 0) +
      row('Starvation', p.starvation, p.starvationDays + ' day' + (p.starvationDays === 1 ? '' : 's') + ' due but not dealt &middot; capped at &minus;' + (Math.round(task.freq * 0.15 * 10) / 10), p.starvation === 0) +
      row('Zone focus', p.zone, task.room + ' is in the active zone', p.zone === 0) +
      row('Cat task', p.cat, 'priority tiebreaker', p.cat === 0) +
      row('Flagged', p.flagged, 'flagged tasks always surface first', p.flagged === 0) +
      (p.jitter ? '<div style="font-size:12px;color:var(--text3);padding:8px 0;border-bottom:0.5px solid var(--border)">&plusmn;1 random shuffle for variety (applied to long-interval tasks each deal)</div>' : '') +
      '<div style="display:flex;justify-content:space-between;padding:10px 0 0;font-weight:700"><span>Total</span><span>' + (Math.round(p.total * 10) / 10) + '</span></div>';

    document.getElementById('whyTitle').textContent = 'Why this task?';
    document.getElementById('whyBody').innerHTML = html;
    document.getElementById('whyModal').classList.add('open');
  }

  function closeWhyModal() {
    document.getElementById('whyModal').classList.remove('open');
  }

  // ─── UI HELPERS ────────────────────────────────────────────────────────────
  
  function switchTab(tab) {
    currentTab = tab;
    const views = ['alina', 'manage', 'sprint', 'presets', 'stats', 'settings'];
    views.forEach(v => {
      const el = document.getElementById(v + 'View');

  // ─── SPRINT TAB ────────────────────────────────────────────────────────────
  
  const BLOCK_HINTS = {
    'Launch':           'Start passive tasks first',
    'Kitchen':          'Work through counters to sink',
    'Cat care':         'Water, food, litter',
    'Laundry':          'Check washer before moving on',
    'Bathrooms':        'Top to bottom, tidy first',
    'Bedroom':          'Tidy first',
    'Living spaces':    'Tidy before wiping surfaces',
    'Office':           'Clear desk before dusting',
    'Hall & entries':   'Sweep last',
    'Around the house': 'Pick a circuit and go',
  };
  
  const ROOM_DISPLAY_NAMES = { 'Cats': 'Cat care' };
  
  function tidyFirst(tasks) {
    return [...tasks].sort((a, b) => {
      const aT = /tidy/i.test(a.name);
      const bT = /tidy/i.test(b.name);
      if (aT && !bT) return -1;
      if (!aT && bT) return 1;
      return 0;
    });
  }
  
  function kitchenOrder(tasks) {
    // unload dishwasher → tidy → wipe counters → everything else
    function rank(t) {
      if (/unload.*dishwasher|dishwasher/i.test(t.name)) return 0;
      if (/tidy/i.test(t.name)) return 1;
      if (/wipe.*counter|counter.*wipe/i.test(t.name)) return 2;
      return 3;
    }
    return [...tasks].sort((a, b) => rank(a) - rank(b));
  }
  
  function bedroomOrder(tasks) {
    // make bed → tidy → everything else
    function rank(t) {
      if (/make.*bed|bed.*make/i.test(t.name)) return 0;
      if (/tidy/i.test(t.name)) return 1;
      return 2;
    }
    return [...tasks].sort((a, b) => rank(a) - rank(b));
  }
  
  function blockLabel(groupLabel, tasks) {
    const rooms = [...new Set(tasks.map(t => t.room))];
    const roomName = rooms.length === 1 ? (ROOM_DISPLAY_NAMES[rooms[0]] || rooms[0]) : null;
    return roomName || groupLabel;
  }
  
  function getSprintBlocks() {
    const hand = getHandTasks();
    if (!hand.length) return [];
  
    const assigned = new Set();
    const blocks = [];
  
    // ── LAUNCH: passive/cycle-starting tasks ──
    const LAUNCH_IDS = ['l_start', 'rob_run_ds', 'rob_run_us', 'rob_mop', 'bed_make'];
    const launchTasks = hand.filter(t => LAUNCH_IDS.includes(t.id));
    if (launchTasks.length) {
      blocks.push({ label: 'Launch', tasks: tidyFirst(launchTasks) });
      launchTasks.forEach(t => assigned.add(t.id));
    }
  
    // ── KITCHEN: kitchen tasks in hand ──
    const kitchenTasks = hand.filter(t => t.room === 'Kitchen' && !assigned.has(t.id));
    if (kitchenTasks.length) {
      const label = blockLabel('Kitchen', kitchenTasks);
      blocks.push({ label, tasks: kitchenOrder(kitchenTasks) });
      kitchenTasks.forEach(t => assigned.add(t.id));
    }
  
    // ── CAT CARE ──
    const catTasks = hand.filter(t => (t.cat || t.room === 'Cats') && !assigned.has(t.id));
    if (catTasks.length) {
      const label = blockLabel('Cat care', catTasks);
      blocks.push({ label, tasks: tidyFirst(catTasks) });
      catTasks.forEach(t => assigned.add(t.id));
    }
  
    // ── LAUNDRY: process steps + everything in the Laundry Room, one block ──
    // Loads/tidy first (decide what's washing), then process steps in order.
    const LAUNDRY_IDS = ['l_dryer', 'l_fold', 'l_put_away'];
    const laundryTasks = hand
      .filter(t => (LAUNDRY_IDS.includes(t.id) || t.room === 'Laundry Room') && !assigned.has(t.id))
      .sort((a, b) => {
        const ai = LAUNDRY_IDS.indexOf(a.id), bi = LAUNDRY_IDS.indexOf(b.id);
        return (ai === -1 ? -1 : ai) - (bi === -1 ? -1 : bi);
      });
    if (laundryTasks.length) {
      blocks.push({ label: 'Laundry', tasks: laundryTasks });
      laundryTasks.forEach(t => assigned.add(t.id));
    }
  
    // ── REMAINING: group by room ──
    const ROOM_TO_GROUP = {
      'DS Bathroom': 'Bathrooms', 'US Bathroom': 'Bathrooms',
      'Bedroom': 'Bedroom',
      'Living Room': 'Living spaces', 'Dining Room': 'Living spaces',
      'Sunroom': 'Living spaces', 'Back Room': 'Living spaces',
      'Office': 'Office',
      'Hall & Stairs': 'Hall & entries', 'Mud Room': 'Hall & entries', 'Back Porch': 'Hall & entries',
      'Whole House': 'Around the house', 'Robot': 'Around the house',
      'Downstairs': 'Around the house', 'Upstairs': 'Around the house',
    };
    const GROUP_ORDER = ['Bathrooms', 'Bedroom', 'Living spaces', 'Office', 'Hall & entries', 'Around the house'];
  
    const remaining = hand.filter(t => !assigned.has(t.id));
    const groups = {};
    remaining.forEach(t => {
      const group = ROOM_TO_GROUP[t.room] || 'Other';
      if (!groups[group]) groups[group] = [];
      groups[group].push(t);
    });
  
    const roomBlocks = [];
    GROUP_ORDER.forEach(g => {
      if (groups[g] && groups[g].length) {
        const label = blockLabel(g, groups[g]);
        const sortFn = g === 'Bedroom' ? bedroomOrder : tidyFirst;
        roomBlocks.push({ label, tasks: sortFn(groups[g]) });
      }
    });
    if (groups['Other'] && groups['Other'].length) {
      roomBlocks.push({ label: 'Other tasks', tasks: tidyFirst(groups['Other']) });
    }
  
    blocks.push(...roomBlocks);
    return blocks;
  }
  
  function renderSprint() {
    const hand = getHandTasks();
    const container = document.getElementById('sprintContent');
  
    if (!hand.length) {
      container.innerHTML = '<div class="empty">No tasks dealt yet — check the Alina tab first.</div>';
      return;
    }
  
    const sprintBlocks = getSprintBlocks();
    const doneCount = hand.filter(t => wasCompletedToday(t)).length;
    const totalMin = hand.reduce((s,t) => s + taskTime(t), 0);
    const doneMin = hand.filter(t => wasCompletedToday(t)).reduce((s,t) => s + taskTime(t), 0);
    const leftMin = totalMin - doneMin;
  
    let html = '<div class="sprint-progress">' +
      '<div class="sprint-progress-stats">' +
        '<span class="sprint-progress-label">Sprint</span>' +
        '<div class="sprint-progress-bar-wrap">' +
          '<div class="sprint-progress-bar" style="width:' + (hand.length ? Math.round(doneCount/hand.length*100) : 0) + '%"></div>' +
        '</div>' +
        '<span class="sprint-progress-text">' + doneCount + ' / ' + hand.length + '</span>' +
      '</div>' +
      '<span class="sprint-time-left">~' + fmtMinutes(leftMin) + ' left</span>' +

      if (blockIdx > 0) html += '<div class="sprint-block-divider"></div>';
      const allDone = block.tasks.every(t => wasCompletedToday(t));
      const blockHint = BLOCK_HINTS[block.label] || '';
      const blockLeftMin = block.tasks.filter(t => !wasCompletedToday(t)).reduce((s,t) => s + taskTime(t), 0);
      html += '<div class="sprint-block">' +
        '<div class="sprint-block-header">' +
          '<span class="sprint-block-num">' + (blockIdx + 1) + '</span>' +
          '<div class="sprint-block-meta">' +
            '<div class="sprint-block-label-row">' +
              '<span class="sprint-block-label">' + block.label + '</span>' +
              (allDone ? '<span class="sprint-done-badge">Done! ✓</span>' : '<span class="sprint-block-time">⏱ ~' + fmtMinutes(blockLeftMin) + '</span>') +
            '</div>' +
            (blockHint ? '<div class="sprint-block-hint">' + blockHint + '</div>' : '') +
          '</div>' +
        '</div>';
  
      const visibleTasks = sprintHideCompleted ? block.tasks.filter(t => !wasCompletedToday(t)) : block.tasks;
      if (sprintHideCompleted && visibleTasks.length === 0) { html += '</div>'; return; }
      visibleTasks.forEach(t => {
        const isDone = wasCompletedToday(t);
        const sPinned = state.pinnedIds && state.pinnedIds.includes(t.id);
        const sRunning = activeTimer && activeTimer.id === t.id;
        const sInProgress = !!(state.inProgress && state.inProgress[t.id]);
        const sProgressBtn = !isDone
          ? '<button onclick="event.stopPropagation();toggleInProgress(\'' + t.id + '\')" title="' + (sInProgress ? 'Clear in progress' : 'Mark in progress') + '" style="margin-left:8px;padding:2px 8px;font-size:11px;border:1px solid ' + (sInProgress ? 'var(--amber)' : 'var(--border2)') + ';border-radius:6px;color:' + (sInProgress ? 'var(--amber)' : 'var(--text3)') + ';background:' + (sInProgress ? 'var(--amber-bg)' : 'transparent') + ';cursor:pointer;flex-shrink:0">&#9203;</button>'
          : '';
        const sTimerBtn = !isDone
          ? '<button onclick="event.stopPropagation();toggleTimer(\'' + t.id + '\')" style="margin-left:8px;padding:2px 8px;font-size:11px;border:1px solid ' + (sRunning ? 'var(--red)' : 'var(--border2)') + ';border-radius:6px;color:' + (sRunning ? 'var(--red)' : 'var(--text3)') + ';background:transparent;cursor:pointer;flex-shrink:0">⏱</button>'
          : '';
        const sRemoveBtn = !isDone && !sPinned
          ? '<button onclick="event.stopPropagation();removeFromHand(\'' + t.id + '\')" style="margin-left:8px;padding:2px 8px;font-size:11px;border:1px solid var(--red);border-radius:6px;color:var(--red);background:transparent;cursor:pointer;flex-shrink:0">✕</button>'
          : '';
        html += '<div class="sprint-card ' + (isDone ? 'done' : '') + '" onclick="completeTask(\'' + t.id + '\')">' +
          '<div class="sprint-check"><div class="sprint-check-inner"></div></div>' +
          '<div class="sprint-card-body">' +
            '<div class="sprint-card-top">' +

            '</div>' +
          '</div>' +
          sProgressBtn +
          sTimerBtn +
          sRemoveBtn +
        '</div>';
      });
  
      html += '</div>';

  function getBestTidyTask() {
    const allTasks = getAllTasks();
    const now = Date.now();
    return EVENING_TIDY_POOL
      .map(id => allTasks.find(t => t.id === id))
      .filter(Boolean)
      .map(t => {
        const lastDone = state.completions[t.id] || (now - t.freq * 86400000);
        return { task: t, ratio: (now - lastDone) / 86400000 / t.freq };
      })
      .sort((a, b) => b.ratio - a.ratio)[0]?.task || null;
  }
