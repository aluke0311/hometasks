      deep: ['lroom_tidy','lroom_dust','lroom_trash','lroom_washer'] },
    { id:'hall',      label:'Hall & Stairs',
      quick:['hs_tidy','hs_sweep'],
      deep: ['hs_tidy','hs_sweep','hs_mop','hs_dust','hs_mirror'] },
    { id:'mudRoom',   label:'Mud Room',
      quick:['mud_tidy'],
      deep: ['mud_tidy','mud_sweep'] },
    { id:'backPorch', label:'Back Porch',
      quick:['bp_tidy'],
      deep: ['bp_tidy','bp_sweep','bp_furniture'] },
    { id:'cats',      label:'Cats',
      quick:['c_scoop_ds','c_water_ds','c_water_up'],
      deep: ['c_scoop_ds','c_water_ds','c_water_up','c_water_bowl_up','c_water_bowl_ds','c_feeders','c_litter_robot_bin','c_litter_robot_wipe'] },
  ];

  function generateRoomPreset(roomId, depth) {
    const preset = ROOM_PRESETS.find(r => r.id === roomId);
    if (!preset) return;
    if (!state.presetHands) state.presetHands = {};
    state.presetHands['room_' + roomId + '_' + depth] = [...preset[depth === 'deep' ? 'deep' : 'quick']];
    saveState();
    renderPresets();
  }

  function loadRoomPreset(roomId, depth) {
    const key = 'room_' + roomId + '_' + depth;
    const ids = state.presetHands && state.presetHands[key];
    if (!ids || !ids.length) return;
    state.hand = [...ids];
    state.handDate = todayStr();
    state.presetHands[key] = null;
    saveState();
    switchTab('sprint');
  }

  function loadRoomPresetDueOnly(roomId, depth) {
    const key = 'room_' + roomId + '_' + depth;
    const allIds = state.presetHands && state.presetHands[key];
    if (!allIds || !allIds.length) return;
    const allTasks = getAllTasks();
    const dueIds = allIds.filter(id => { const t = allTasks.find(t => t.id === id); return t && isDue(t); });
    if (!dueIds.length) { showToast('No due tasks in this preset'); return; }
    state.hand = [...dueIds];
    state.handDate = todayStr();
    state.presetHands[key] = null;
    saveState();
    switchTab('sprint');
  }
  
  let guestMode = 'day'; // 'day' | 'overnight'
  let randomTier = 'all'; // 'all' | 'A' | 'B' | 'C'
  let randomPick = null;  // { id, name, room, time, tier }

  function pickRandomTask() {
    const allTasks = getAllTasks();
    const pool = allTasks.filter(t => {
      if (!isDue(t)) return false;
      if (!inSeason(t)) return false;
      if (wasCompletedToday(t)) return false;
      if (randomTier !== 'all' && getTaskTier(t) !== randomTier) return false;
      return true;
    });
    if (!pool.length) { randomPick = null; renderPresets(); return; }
    const t = pool[Math.floor(Math.random() * pool.length)];
    randomPick = t;
    renderPresets();
  }

  function addRandomPickToHand() {
    if (!randomPick) return;
    if (!state.hand) state.hand = [];
    if (!state.hand.includes(randomPick.id)) state.hand.push(randomPick.id);
    if (!state.handDate) state.handDate = todayStr();
    randomPick = null;
    saveState();
    renderPresets();
    showToast('Added to today!');
  }
  
  function getGuestPresetTasks(mode) {
    const allTasks = getAllTasks();
    const ids = mode === 'overnight' ? [...GUEST_DAY_IDS, ...GUEST_OVERNIGHT_IDS]
              : mode === 'emergency' ? GUEST_EMERGENCY_IDS
              : GUEST_DAY_IDS;
    return ids.map(id => {
      const found = allTasks.find(t => t.id === id);
      if (found) return found;
      const resetMatch = FULL_RESET_TASKS.find(t => t.id === id);
      return resetMatch || null;
    }).filter(Boolean);
  }
  
  function generateGuestHand() {
    state.guestHand = getGuestPresetTasks(guestMode).map(t => t.id);
    saveState();
    renderPresets();
  }
  
  function generateResetHand() {
    state.resetHand = FULL_RESET_TASKS.map(t => t.id);
    saveState();
    renderPresets();
  }
  
  function generateGoingOutHand() {
    state.goingOutHand = GOING_OUT_TASKS.map(t => t.id);
    saveState();
    renderPresets();
  }
  
  function loadPresetIntoHand(preset) {
    const ids = preset === 'guest' ? state.guestHand :
                preset === 'reset' ? state.resetHand :
                state.goingOutHand;
    if (!ids || !ids.length) return;
    state.hand = [...ids];
    state.handDate = todayStr();
    state.guestHand = null;
    state.resetHand = null;
    state.goingOutHand = null;
    saveState();
    switchTab('sprint');
  }

  // ── NEW PRESET FUNCTIONS ────────────────────────────────────────────────────

  function generateNewPreset(type) {
    if (!state.presetHands) state.presetHands = {};
    state.presetHands[type] = getNewPresetAllIds(type);
    saveState();
    renderPresets();
  }

  function clearNewPreset(type) {
    if (!state.presetHands) state.presetHands = {};
    state.presetHands[type] = null;
    saveState();
    renderPresets();
  }

  function loadNewPreset(type) {
    const ids = state.presetHands && state.presetHands[type];
    if (!ids || !ids.length) return;
    state.hand = [...ids];
    state.handDate = todayStr();
    state.presetHands[type] = null;
    saveState();
    switchTab('sprint');
  }

  function loadNewPresetDueOnly(type) {
    const allIds = state.presetHands && state.presetHands[type];
    if (!allIds || !allIds.length) return;
    const allTasks = getAllTasks();
    const dueIds = allIds.filter(id => {
      const t = allTasks.find(t => t.id === id);
      return t && isDue(t);
    });
    if (!dueIds.length) { showToast('No due tasks in this preset'); return; }
    state.hand = [...dueIds];
    state.handDate = todayStr();
    state.presetHands[type] = null;
    saveState();
    switchTab('sprint');
  }

  function loadRecoveryPhase(maxPhase) {
    const ids = RECOVERY_SECTIONS.filter(s => s.phase <= maxPhase).flatMap(s => s.ids);
    state.hand = [...ids];
    state.handDate = todayStr();
    if (state.presetHands) state.presetHands.recovery = null;
    saveState();
    switchTab('sprint');
  }

  function renderNewPresetChecklist(sections) {
    const allTasks = getAllTasks();
    let html = '';
    sections.forEach(section => {
      const doneCount = section.ids.filter(id => {
        const t = allTasks.find(t => t.id === id);
        return t && wasCompletedToday(t);
      }).length;
      html +=
        '<div style="font-size:12px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.05em;margin:14px 0 6px">' +
          section.label + ' <span style="font-weight:400">(' + doneCount + '/' + section.ids.length + ')</span>' +
        '</div>';
      html += renderPresetChecklist(section.ids, allTasks);
    });
    return html;
  }

  function presetTotalTime(sections) {
    const allTasks = getAllTasks();
    return sections.flatMap(s => s.ids).reduce((sum, id) => {
      const t = allTasks.find(t => t.id === id);
      return sum + (t ? t.time : 0);
    }, 0);
  }
  
  function renderPresetChecklist(taskIds, taskSource) {
    const allRealTasks = getAllTasks();
    let html = '';
    taskIds.forEach(id => {
      const t = taskSource.find(x => x.id === id) || allRealTasks.find(x => x.id === id);
      if (!t) return;
      const isDone = wasCompletedToday(t);
      const realTask = allRealTasks.find(x => x.id === id);
      const taskDue = realTask && !isDone && isDue(realTask);
      const dueHtml = taskDue ? ' <span class="task-overdue" style="font-size:10px;padding:1px 5px">due</span>' : '';
      html +=
        '<div class="sprint-card ' + (isDone ? 'done' : '') + '" onclick="completeTask(\'' + t.id + '\')" style="margin:0 0 6px">' +
          '<div class="sprint-check"><div class="sprint-check-inner"></div></div>' +
          '<div class="sprint-card-body">' +
            '<div class="sprint-card-top">' +
              '<span class="sprint-card-name">' + t.name + dueHtml + '</span>' +
              '<span class="sprint-card-time">' + fmtMinutes(t.time) + '</span>' +
            '</div>' +
            '<div style="font-size:11px;color:var(--text3);margin-top:1px">' + t.room + '</div>' +
          '</div>' +
        '</div>';
    });
    return html;
  }
  
  function renderPresets() {
    const allTasks = getAllTasks();
    const ph = state.presetHands || {};

    function categoryHeader(label) {
      return '<div style="font-size:11px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--text3);padding:24px 0 4px">' + label + '</div>';
    }

    function loadBtns(loadAll, loadDue) {
      return '<div style="display:flex;gap:8px;margin-bottom:14px">' +
        '<button onclick="' + loadAll + '" style="flex:1;padding:10px;background:var(--bg2);border:1px solid var(--border);border-radius:10px;font-size:14px;cursor:pointer;color:var(--text)">Load all →</button>' +
        '<button onclick="' + loadDue + '" style="flex:1;padding:10px;background:var(--bg2);border:1px solid var(--border);border-radius:10px;font-size:14px;cursor:pointer;color:var(--text)">Load due only →</button>' +
      '</div>';
    }

    let html = '<div style="padding:0 24px 32px">';

    // ── RANDOM TASK ───────────────────────────────────────────────────────────
    const tierLabels = { all: 'All', A: 'Tier A', B: 'Tier B', C: 'Tier C' };
    const tierDescs  = { A: 'Daily & weekly', B: 'Every 2–8 weeks', C: 'Every 2+ months' };
    html += '<div class="settings-card" style="margin-top:4px">' +
      '<div class="settings-card-title">Random Task</div>' +
      '<div class="settings-card-desc">Pick a random due task. Good for when you have a free 10 minutes.</div>' +
      '<div style="display:flex;gap:6px;margin-bottom:12px">';
    ['all','A','B','C'].forEach(tier => {
      const active = randomTier === tier;
      html += '<button onclick="randomTier=\'' + tier + '\';randomPick=null;renderPresets()" style="flex:1;padding:6px 4px;font-size:12px;font-weight:' + (active?'700':'400') + ';border-radius:8px;border:1px solid ' + (active?'var(--green)':'var(--border)') + ';background:' + (active?'var(--green)':'var(--bg2)') + ';color:' + (active?'#fff':'var(--text)') + ';cursor:pointer">' + tierLabels[tier] + '</button>';
    });
    html += '</div>';
    if (randomTier !== 'all') {
      html += '<div style="font-size:11px;color:var(--text3);margin-bottom:10px">' + tierDescs[randomTier] + '</div>';
    }
    if (randomPick) {
      const alreadyInHand = (state.hand || []).includes(randomPick.id);
      html +=
        '<div style="background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:12px 14px;margin-bottom:10px">' +
          '<div style="font-size:15px;font-weight:600;color:var(--text);margin-bottom:4px">' + randomPick.name + '</div>' +
          '<div style="font-size:12px;color:var(--text3)">' +
            (randomPick.room ? randomPick.room + ' · ' : '') +
            'Tier ' + getTaskTier(randomPick) + ' · ' +
            fmtMinutes(randomPick.time) +
          '</div>' +
        '</div>' +
        '<div style="display:flex;gap:8px">' +
          '<button onclick="pickRandomTask()" style="flex:1;padding:10px;background:var(--bg2);border:1px solid var(--border);border-radius:10px;font-size:14px;cursor:pointer;color:var(--text)">Pick another</button>' +
          (alreadyInHand
            ? '<button style="flex:1;padding:10px;background:var(--bg2);border:1px solid var(--border);border-radius:10px;font-size:14px;color:var(--text3);cursor:default">Already in today</button>'
            : '<button onclick="addRandomPickToHand()" style="flex:1;padding:10px;background:var(--green);border:none;border-radius:10px;font-size:14px;cursor:pointer;color:#fff;font-weight:600">Add to today →</button>') +
        '</div>';
    } else {
      html += '<button class="add-btn" style="width:100%" onclick="pickRandomTask()">Pick random task</button>';
    }
    html += '</div>';

    // ── ROUTINES ──────────────────────────────────────────────────────────────
    html += categoryHeader('Routines');

    // Express Reset
    const exActive = ph.expressReset && ph.expressReset.length;
    const exTime = presetTotalTime(EXPRESS_RESET_SECTIONS);
    html +=
      '<div class="settings-card" style="margin-top:4px">' +
        '<div class="settings-card-title">Express Reset</div>' +
        '<div class="settings-card-desc">Quick whole-house pass. ~' + fmtMinutes(exTime) + '. Kitchen, bathrooms, bedroom, living spaces, cat care.</div>' +
        '<button class="add-btn" style="width:100%;margin-bottom:' + (exActive ? '14px' : '0') + '" onclick="generateNewPreset(\'expressReset\')">Generate Express Reset</button>';
    if (exActive) {
      html += loadBtns("loadNewPreset('expressReset')", "loadNewPresetDueOnly('expressReset')");
      html += renderNewPresetChecklist(EXPRESS_RESET_SECTIONS);
    }
    html += '</div>';

    // Full Reset
    html +=
      '<div class="settings-card">' +
        '<div class="settings-card-title">Full Reset</div>' +
        '<div class="settings-card-desc">Complete whole-house clean. Expect 2–3 hours.</div>' +
        '<button class="add-btn" style="width:100%;margin-bottom:' + (state.resetHand ? '10px' : '0') + '" onclick="generateResetHand()">Generate Full Reset</button>';
    if (state.resetHand && state.resetHand.length) {
      html += loadBtns("loadPresetIntoHand('reset')", "loadPresetDueOnly('reset')");
      FULL_RESET_SECTIONS.forEach(section => {
        const done = section.ids.filter(id => {
          const t = FULL_RESET_TASKS.find(x => x.id === id) || allTasks.find(x => x.id === id);
          return t && wasCompletedToday(t);
        }).length;
        html +=
          '<div style="font-size:12px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.05em;margin:14px 0 6px">' +
            section.label + ' <span style="font-weight:400">(' + done + '/' + section.ids.length + ')</span>' +
          '</div>';
        html += renderPresetChecklist(section.ids, FULL_RESET_TASKS);
      });
    }
    html += '</div>';

    // ── GUESTS ────────────────────────────────────────────────────────────────
    html += categoryHeader('Guests');

    const guestActive = state.guestHand && state.guestHand.length;
    html +=
      '<div class="settings-card" style="margin-top:4px">' +
        '<div class="settings-card-title">Guest Prep</div>' +
        '<div class="settings-card-desc">Get the house ready for visitors.</div>' +
        '<div style="display:flex;gap:12px;flex-wrap:wrap;margin-bottom:12px">' +
          '<label style="display:flex;align-items:center;gap:6px;font-size:13px;cursor:pointer">' +
            '<input type="radio" name="guestMode" value="emergency"' + (guestMode==='emergency'?' checked':'') + ' onchange="guestMode=\'emergency\';renderPresets()"> Emergency (~15 min)' +
          '</label>' +
          '<label style="display:flex;align-items:center;gap:6px;font-size:13px;cursor:pointer">' +
            '<input type="radio" name="guestMode" value="day"' + (guestMode==='day'?' checked':'') + ' onchange="guestMode=\'day\';renderPresets()"> Day guests' +
          '</label>' +
          '<label style="display:flex;align-items:center;gap:6px;font-size:13px;cursor:pointer">' +
            '<input type="radio" name="guestMode" value="overnight"' + (guestMode==='overnight'?' checked':'') + ' onchange="guestMode=\'overnight\';renderPresets()"> Overnight' +
          '</label>' +
        '</div>' +
        (guestMode === 'emergency' ? '<div style="font-size:12px;color:var(--text3);margin-bottom:10px">Visible-impact tasks only — counters, living room, dining room, DS bathroom, entryway.</div>' : '') +
        '<button class="add-btn" style="width:100%;margin-bottom:' + (guestActive ? '14px' : '0') + '" onclick="generateGuestHand()">Generate Guest Prep</button>';
    if (guestActive) {
      const combined = [...allTasks, ...FULL_RESET_TASKS];
      html += loadBtns("loadPresetIntoHand('guest')", "loadPresetDueOnly('guest')");
      html += renderPresetChecklist(state.guestHand, combined);
    }
    html += '</div>';

    // ── TRAVEL ────────────────────────────────────────────────────────────────
    html += categoryHeader('Travel');

    // Going Out of Town
    const goingOutActive = state.goingOutHand && state.goingOutHand.length;
    html +=
      '<div class="settings-card" style="margin-top:4px">' +
        '<div class="settings-card-title">Going Out of Town</div>' +
        '<div class="settings-card-desc">Leave the house in great shape before you go.</div>' +
        '<button class="add-btn" style="width:100%;margin-bottom:' + (goingOutActive ? '10px' : '0') + '" onclick="generateGoingOutHand()">Generate Going Out of Town</button>';
    if (goingOutActive) {
      html += loadBtns("loadPresetIntoHand('goingout')", "loadPresetDueOnly('goingout')");
      GOING_OUT_SECTIONS.forEach(section => {
        const done = section.ids.filter(id => {
          const t = allTasks.find(x => x.id === id) || GOING_OUT_TASKS.find(x => x.id === id);
          return t && wasCompletedToday(t);
        }).length;
        html +=
          '<div style="font-size:12px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.05em;margin:14px 0 6px">' +
            section.label + ' <span style="font-weight:400">(' + done + '/' + section.ids.length + ')</span>' +
          '</div>';
        html += renderPresetChecklist(section.ids, GOING_OUT_TASKS);
      });
    }
    html += '</div>';

    // Return Home
    const rhActive = ph.returnHome && ph.returnHome.length;
    const rhTime = presetTotalTime(RETURN_HOME_SECTIONS);
    html +=
      '<div class="settings-card">' +
        '<div class="settings-card-title">Return Home</div>' +
        '<div class="settings-card-desc">Get the house back to baseline after travel. ~' + fmtMinutes(rhTime) + '. Fridge, cat care, laundry, bedroom.</div>' +
        '<button class="add-btn" style="width:100%;margin-bottom:' + (rhActive ? '14px' : '0') + '" onclick="generateNewPreset(\'returnHome\')">Generate Return Home</button>';
    if (rhActive) {
      html += loadBtns("loadNewPreset('returnHome')", "loadNewPresetDueOnly('returnHome')");
      html += renderNewPresetChecklist(RETURN_HOME_SECTIONS);
    }
    html += '</div>';

    // ── SPECIAL ───────────────────────────────────────────────────────────────
    html += categoryHeader('Special');

    // Before Cleaners
    const bcActive = ph.beforeCleaners && ph.beforeCleaners.length;
    const bcTime = presetTotalTime(BEFORE_CLEANERS_SECTIONS);
    html +=
      '<div class="settings-card" style="margin-top:4px">' +
        '<div class="settings-card-title">Before Cleaners</div>' +
        '<div class="settings-card-desc">Prep so the professionals can do their best work. ~' + fmtMinutes(bcTime) + '. Declutter + cat care (cleaners won\'t touch it).</div>' +
        '<button class="add-btn" style="width:100%;margin-bottom:' + (bcActive ? '14px' : '0') + '" onclick="generateNewPreset(\'beforeCleaners\')">Generate Before Cleaners</button>';
    if (bcActive) {
      html += loadBtns("loadNewPreset('beforeCleaners')", "loadNewPresetDueOnly('beforeCleaners')");
      html += renderNewPresetChecklist(BEFORE_CLEANERS_SECTIONS);
    }
    html += '</div>';

    // Recovery
    const recActive = ph.recovery && ph.recovery.length;
    const p1Time = presetTotalTime([RECOVERY_SECTIONS[0]]);
    html +=
      '<div class="settings-card">' +
        '<div class="settings-card-title">Recovery Mode</div>' +
        '<div class="settings-card-desc">When things feel overwhelming. Start with Phase 1 — that\'s enough. Phase 1 is only ~' + fmtMinutes(p1Time) + ' min.</div>' +
        '<button class="add-btn" style="width:100%;margin-bottom:' + (recActive ? '14px' : '0') + '" onclick="generateNewPreset(\'recovery\')">Generate Recovery Plan</button>';
    if (recActive) {
      html +=
        '<div style="display:flex;gap:8px;margin-bottom:14px">' +
          '<button onclick="loadRecoveryPhase(1)" style="flex:1;padding:10px;background:var(--bg2);border:1px solid var(--border);border-radius:10px;font-size:14px;cursor:pointer;color:var(--text)">Phase 1 only →</button>' +
          '<button onclick="loadRecoveryPhase(3)" style="flex:1;padding:10px;background:var(--bg2);border:1px solid var(--border);border-radius:10px;font-size:14px;cursor:pointer;color:var(--text)">All phases →</button>' +
        '</div>';
      html += renderNewPresetChecklist(RECOVERY_SECTIONS);
    }
    html += '</div>';

    // Post-Illness
    const piActive = ph.postIllness && ph.postIllness.length;
    const piP1Time = presetTotalTime([POST_ILLNESS_SECTIONS[0]]);
    html +=
      '<div class="settings-card">' +
        '<div class="settings-card-title">Post-Illness</div>' +
        '<div class="settings-card-desc">Sanitize high-touch surfaces first (~' + fmtMinutes(piP1Time) + ' min), then restore normal routines when you\'re ready.</div>' +
        '<button class="add-btn" style="width:100%;margin-bottom:' + (piActive ? '14px' : '0') + '" onclick="generateNewPreset(\'postIllness\')">Generate Post-Illness Plan</button>';
    if (piActive) {
      html +=
        '<div style="display:flex;gap:8px;margin-bottom:14px">' +
          '<button onclick="loadPostIllnessPhase(1)" style="flex:1;padding:10px;background:var(--bg2);border:1px solid var(--border);border-radius:10px;font-size:14px;cursor:pointer;color:var(--text)">Sanitize only →</button>' +
          '<button onclick="loadPostIllnessPhase(2)" style="flex:1;padding:10px;background:var(--bg2);border:1px solid var(--border);border-radius:10px;font-size:14px;cursor:pointer;color:var(--text)">Full plan →</button>' +
        '</div>';
      html += renderNewPresetChecklist(POST_ILLNESS_SECTIONS);
    }
    html += '</div>';

    // ── DAILY RITUALS ─────────────────────────────────────────────────────────
    html += categoryHeader('Daily Rituals');

    // Evening Shutdown
    const esActive = ph.eveningShutdown && ph.eveningShutdown.length;
    const selectedTidyId = esActive ? ph.eveningShutdown.find(id => EVENING_TIDY_POOL.includes(id)) : null;
    const selectedTidyTask = selectedTidyId ? allTasks.find(t => t.id === selectedTidyId) : null;
    html +=
      '<div class="settings-card" style="margin-top:4px">' +
        '<div class="settings-card-title">Evening Shutdown</div>' +
        '<div class="settings-card-desc">Dishes, counters, cat water + tonight\'s tidy room (picks whichever is most overdue). ~15–20 min.</div>' +
        (selectedTidyTask ? '<div style="font-size:12px;color:var(--amber);margin-bottom:10px">Tonight\'s tidy: ' + selectedTidyTask.room + '</div>' : '') +
        '<button class="add-btn" style="width:100%;margin-bottom:' + (esActive ? '14px' : '0') + '" onclick="generateEveningShutdown()">Generate Evening Shutdown</button>';
    if (esActive) {
      html += loadBtns("loadNewPreset('eveningShutdown')", "loadNewPresetDueOnly('eveningShutdown')");
      html += renderPresetChecklist(ph.eveningShutdown, allTasks);
    }
    html += '</div>';

    // ── ROOMS ─────────────────────────────────────────────────────────────────
    html += categoryHeader('Rooms');

    ROOM_PRESETS.forEach(room => {
      const qKey = 'room_' + room.id + '_quick';
      const dKey = 'room_' + room.id + '_deep';
      const qActive = ph[qKey] && ph[qKey].length;
      const dActive = ph[dKey] && ph[dKey].length;
      const anyActive = qActive || dActive;
      const qTime = room.quick.reduce((s, id) => s + (allTasks.find(t => t.id === id)?.time || 0), 0);

  // ─── STATS TAB ─────────────────────────────────────────────────────────────

  function dayKeyOf(ts) {
    const d = new Date(ts);
    return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');
  }

  function statsByDay() {
    const allTasks = getAllTasks();
    const timeById = {};
    allTasks.forEach(t => timeById[t.id] = t.time);
    TASKS.forEach(t => { if (!(t.id in timeById)) timeById[t.id] = t.time; });
    const days = {};
    Object.entries(state.completionHistory || {}).forEach(([id, stamps]) => {
      (stamps || []).forEach(ts => {
        const key = dayKeyOf(ts);
        if (!days[key]) days[key] = { count: 0, minutes: 0 };
        days[key].count++;
        days[key].minutes += timeById[id] || 0;
      });
    });
    return days;
  }

  function medianRealFreq(taskId) {
    const h = (state.completionHistory || {})[taskId];
    if (!h || h.length < 3) return null;
    const sorted = [...h].sort((a,b) => a - b);
    const intervals = [];
    for (let i = 1; i < sorted.length; i++) intervals.push((sorted[i] - sorted[i-1]) / 86400000);
    intervals.sort((a,b) => a - b);
    const mid = Math.floor(intervals.length / 2);
    const med = intervals.length % 2 ? intervals[mid] : (intervals[mid-1] + intervals[mid]) / 2;
    return Math.round(med);
  }

  // Budget insight: compare actual non-daily throughput (median minutes/day over
  // the last 28 days, zero-activity days excluded) against the configured budgets.
  // Hand-agnostic by design: redeals, presets, and quick-logs all count the same.
  function budgetSuggestion() {
    const allTasks = getAllTasks();
    const byId = {};
    allTasks.forEach(t => byId[t.id] = t);
    const days = {};
    const today = todayStr();
    Object.entries(state.completionHistory || {}).forEach(([id, stamps]) => {
      const t = byId[id];
      if (!t || t.freq <= 1) return;
      (stamps || []).forEach(ts => {
        if ((Date.now() - ts) / 86400000 > 28) return;
        const key = dayKeyOf(ts);
        if (key === today) return; // today is still in progress
        if (!days[key]) {
          const d = new Date(ts);
          days[key] = { min: 0, weekend: d.getDay() === 0 || d.getDay() === 6 };
        }
        days[key].min += taskTime(t);
      });
    });
    const wd = [], we = [];
    Object.values(days).forEach(d => (d.weekend ? we : wd).push(d.min));
    function median(arr) {
      if (!arr.length) return null;
      const s = [...arr].sort((a,b) => a - b);
      const m = Math.floor(s.length / 2);
      return s.length % 2 ? s[m] : Math.round((s[m-1] + s[m]) / 2);
    }
    function analyze(arr, current, minDays) {
      const med = median(arr);
      if (med === null || arr.length < minDays) return { median: med, days: arr.length, target: null };
      let target = null;
      if (Math.abs(med - current) >= Math.max(10, current * 0.2)) {
        target = Math.max(15, Math.round(med / 5) * 5);
        if (target === current) target = null;
      }
      return { median: med, days: arr.length, target };
    }
    return {
      weekday: analyze(wd, state.budgetWeekday, 6),
      weekend: analyze(we, state.budgetWeekend, 3),
    };
  }

  function applyBudget(type, value) {
    if (type === 'weekday') state.budgetWeekday = value;
    else state.budgetWeekend = value;
    state.hand = null;
    saveState();
    render();
    showToast((type === 'weekday' ? 'Weekday' : 'Weekend') + ' budget set to ' + value + 'm');
  }

  // Cadence = how often a task really gets done vs its target frequency
  function cadenceInfo(task) {
    const real = medianRealFreq(task.id);
    if (real === null) return null;
    const ratio = real / Math.max(task.freq, 1);
    const color = ratio > 1.5 ? 'var(--red)' : ratio > 1.15 ? 'var(--amber)' : ratio < 0.8 ? 'var(--blue)' : 'var(--green)';
    return { real, ratio, color };
  }

  // Adopt the real cadence as the new target frequency (same override path as the editor)
  function setTaskFreq(id, freq) {
    const t = getAllTasks().find(x => x.id === id);
    if (!t || !freq || freq < 1) return;
    if (!state.customTasks) state.customTasks = {};
    if (!state.deletedIds) state.deletedIds = [];
    if (TASKS.find(x => x.id === id)) state.deletedIds = [...new Set([...state.deletedIds, id])];
    state.customTasks[id] = { ...t, freq };
    state.hand = null;
    saveState();
    render();
    showToast('Target updated: every ' + freq + 'd');
  }

  function renderStats() {
    const days = statsByDay();
    const today = new Date();

    function keyDaysAgo(n) {
      const d = new Date(today.getFullYear(), today.getMonth(), today.getDate() - n);
      return dayKeyOf(d.getTime());
    }

    // ── Streak: consecutive days with ≥1 completion, today not required yet ──
    let streak = 0;
    const start = (days[keyDaysAgo(0)] && days[keyDaysAgo(0)].count > 0) ? 0 : 1;
    for (let i = start; i < 365; i++) {
      if (days[keyDaysAgo(i)] && days[keyDaysAgo(i)].count > 0) streak++;
      else break;
    }

    // ── Week comparison (last 7 days vs the 7 before) ──
    function sumRange(from, to) {
      let count = 0, minutes = 0;
      for (let i = from; i < to; i++) {
        const d = days[keyDaysAgo(i)];
        if (d) { count += d.count; minutes += d.minutes; }
      }
      return { count, minutes };
    }
    const thisWeek = sumRange(0, 7);
    const lastWeek = sumRange(7, 14);

    // ── Heatmap: 13 weeks, columns = weeks, rows = Sun–Sat ──
    const totalDays = 91 + today.getDay(); // pad back to a Sunday
    const cells = [];
    let maxCount = 0;
    for (let i = totalDays - 1; i >= 0; i--) {
      const key = keyDaysAgo(i);
      const count = (days[key] && days[key].count) || 0;
      if (count > maxCount) maxCount = count;
      cells.push({ key, count, future: false });
    }
    const weeks = [];
    for (let w = 0; w < cells.length; w += 7) weeks.push(cells.slice(w, w + 7));

    function cellColor(count) {
      if (count === 0) return 'background:var(--bg3)';
      const op = count <= 2 ? 0.3 : count <= 4 ? 0.55 : count <= 7 ? 0.8 : 1;
      return 'background:var(--green);opacity:' + op;
    }
    let heatHtml = '<div style="display:flex;gap:3px;justify-content:flex-start;overflow-x:auto;padding-bottom:4px">';
    weeks.forEach(week => {
      heatHtml += '<div style="display:flex;flex-direction:column;gap:3px">';
      week.forEach(c => {
        heatHtml += '<div title="' + c.key + ': ' + c.count + '" style="width:12px;height:12px;border-radius:3px;' + cellColor(c.count) + '"></div>';
      });
      heatHtml += '</div>';
    });
    heatHtml += '</div>' +
      '<div style="font-size:11px;color:var(--text3);margin-top:6px">Last 13 weeks &middot; darker = more tasks done that day</div>';

    // ── Cadence: every task with 3+ completions, worst ratio first ──
    const allTasks = getAllTasks();
    const tracked = allTasks
      .map(t => ({ t, cad: cadenceInfo(t), n: ((state.completionHistory || {})[t.id] || []).length }))
      .filter(x => x.cad !== null && !x.t.oneOff)
      .sort((a,b) => b.cad.ratio - a.cad.ratio);
    function cadenceRow(x) {
      const overdue = daysOverdue(x.t);
      const dueBadge = !inSeason(x.t)
        ? '<span class="task-notdue">&#10052; off-season</span>'
        : wasCompletedToday(x.t)
        ? '<span class="task-notdue">done today</span>'
        : overdue >= 1 ? '<span class="task-overdue">' + Math.floor(overdue) + 'd overdue</span>'
        : overdue >= 0 ? '<span class="task-overdue">due</span>'
        : '<span class="task-notdue">in ' + Math.ceil(-overdue) + 'd</span>';
      const inHand = !!(state.hand && state.hand.includes(x.t.id));
      const isFlagged = (state.flaggedIds || []).includes(x.t.id);
      const todayBtn = inHand
        ? '<button class="manage-hand-btn in-hand" style="min-height:26px;padding:3px 9px" onclick="removeFromHand(\'' + x.t.id + '\')">&#10003; In hand</button>'
        : '<button class="manage-hand-btn" style="min-height:26px;padding:3px 9px" onclick="addToHand(\'' + x.t.id + '\')">+ Today</button>';
      const flagBtn = '<button class="icon-btn" style="width:26px;height:26px" onclick="' + (isFlagged ? 'unflag' : 'flag') + 'Task(\'' + x.t.id + '\')" title="' + (isFlagged ? 'Unflag' : 'Flag') + '"><span style="' + (isFlagged ? '' : 'opacity:0.35') + '">🚩</span></button>';
      const adoptBtn = x.cad.color !== 'var(--green)' && x.cad.real !== x.t.freq
        ? '<button class="settings-save-btn" style="border-color:var(--border2);color:var(--text2)" onclick="setTaskFreq(\'' + x.t.id + '\',' + x.cad.real + ')">set target ' + x.cad.real + 'd</button>'
        : '';
      return '<div style="padding:8px 0;border-bottom:0.5px solid var(--border)">' +
        '<div style="display:flex;justify-content:space-between;align-items:baseline;gap:10px">' +
          '<div style="min-width:0"><span style="font-size:14px;color:var(--text);cursor:pointer;text-decoration:underline;text-decoration-color:var(--border2);text-underline-offset:3px" onclick="openModal(\'' + x.t.id + '\')" title="Edit task">' + x.t.name + '</span>' +
          ' <span style="font-size:11px;color:var(--text3)">' + x.t.room + ' &middot; n=' + x.n + '</span></div>' +
          '<div style="font-size:12px;color:' + x.cad.color + ';white-space:nowrap">every ~' + x.cad.real + 'd <span style="color:var(--text3)">(target ' + x.t.freq + 'd)</span></div>' +
        '</div>' +
        '<div style="display:flex;align-items:center;gap:6px;margin-top:5px;flex-wrap:wrap">' + dueBadge + '<span style="flex:1"></span>' + adoptBtn + todayBtn + flagBtn + '</div>' +
      '</div>';
    }

    const chronicHtml = tracked.length
      ? tracked.map(cadenceRow).join('')
      : '<div class="settings-card-desc" style="margin-bottom:0">No tasks have 3+ logged completions yet &mdash; cadence appears here as history builds.</div>';

    const html =
      '<div style="padding-bottom:32px">' +
      '<div class="settings-card">' +
        '<div class="settings-card-title">This Week</div>' +
        '<div class="settings-stats-grid">' +
          '<div class="settings-stat-box"><div class="settings-stat-num">' + thisWeek.count + '</div><div class="settings-stat-label">done, last 7 days' + (lastWeek.count ? ' (prev: ' + lastWeek.count + ')' : '') + '</div></div>' +
          '<div class="settings-stat-box"><div class="settings-stat-num">' + fmtMinutes(thisWeek.minutes) + '</div><div class="settings-stat-label">est. effort' + (lastWeek.minutes ? ' (prev: ' + fmtMinutes(lastWeek.minutes) + ')' : '') + '</div></div>' +
          '<div class="settings-stat-box"><div class="settings-stat-num">' + streak + '</div><div class="settings-stat-label">day streak</div></div>' +
          '<div class="settings-stat-box"><div class="settings-stat-num">' + ((days[keyDaysAgo(0)] && days[keyDaysAgo(0)].count) || 0) + '</div><div class="settings-stat-label">done today</div></div>' +
        '</div>' +
      '</div>' +
      (function() {
        const bs = budgetSuggestion();
        function line(label, a, current, type) {
          if (a.median === null) return '<div style="font-size:13px;color:var(--text3);padding:6px 0">' + label + ': not enough history yet.</div>';
          let html = '<div style="padding:6px 0;border-bottom:0.5px solid var(--border)">' +
            '<div style="font-size:13px;color:var(--text2)">' + label + ': you actually do <b>~' + a.median + 'm</b>/day of non-daily work (median of ' + a.days + ' active days) vs a <b>' + current + 'm</b> budget.</div>';
          if (a.target !== null) {
            html += '<div style="display:flex;align-items:center;gap:10px;margin-top:6px">' +
              '<span style="font-size:13px;color:var(--amber)">Suggest ' + (a.target > current ? 'raising' : 'lowering') + ' to ' + a.target + 'm</span>' +
              '<button class="settings-save-btn" onclick="applyBudget(\'' + type + '\',' + a.target + ')">Apply</button>' +
            '</div>';
          } else {
            html += '<div style="font-size:12px;color:var(--green);margin-top:2px">Budget matches your real pace 👍</div>';
          }
          return html + '</div>';
        }
        return '<div class="settings-card">' +
          '<div class="settings-card-title">Budget Insight</div>' +
          '<div class="settings-card-desc">Based on what you actually complete (any source: hand, redeals, presets, quick-log) — vacation and zero days excluded. Suggestions only; nothing changes unless you apply.</div>' +
          line('Weekdays', bs.weekday, state.budgetWeekday, 'weekday') +
          line('Weekends', bs.weekend, state.budgetWeekend, 'weekend') +
        '</div>';
      })() +
      '<div class="settings-card">' +
        '<div class="settings-card-title">Activity</div>' +
        heatHtml +
      '</div>' +
      '<div class="settings-card">' +
        '<div class="settings-card-title">Completion Cadence</div>' +
        '<div class="settings-card-desc">How often each task really gets done (median interval, 3+ completions), worst-behind first. <span style="color:var(--red)">Red</span> = 1.5&times;+ behind target, <span style="color:var(--amber)">amber</span> = somewhat behind, <span style="color:var(--green)">green</span> = on pace, <span style="color:var(--blue)">blue</span> = more often than needed. Tap a name to edit its target.</div>' +
        chronicHtml +
      '</div>' +
      '</div>';

    document.getElementById('statsContent').innerHTML = html;
  }

        '<div style="font-size:13px;font-weight:600;margin-bottom:8px">Export</div>' +
        '<button class="add-btn" style="width:100%;margin-bottom:10px" onclick="exportData()">Copy data to clipboard</button>' +
        '<textarea id="exportTextarea" readonly style="display:none;width:100%;height:100px;font-size:13px;font-family:monospace;border:0.5px solid var(--border2);border-radius:var(--radius-sm);padding:8px;background:var(--bg2);color:var(--text);resize:none;-webkit-user-select:all;user-select:all"></textarea>' +
        '<div style="height:16px;border-top:0.5px solid var(--border);margin:16px -24px 0;padding-top:16px;margin-bottom:0"></div>' +
        '<div style="font-size:13px;font-weight:600;margin-bottom:4px;margin-top:16px">Import</div>' +
        '<div style="font-size:12px;color:var(--red);margin-bottom:8px">⚠️ Overwrites all current data.</div>' +
        '<textarea id="importTextarea" placeholder="Paste exported data here…" style="width:100%;height:90px;font-size:13px;font-family:monospace;border:0.5px solid var(--border2);border-radius:var(--radius-sm);padding:8px;background:var(--card);color:var(--text);resize:none;margin-bottom:8px"></textarea>' +
        '<button class="add-btn" style="width:100%;background:var(--red)" onclick="importData()">Import &amp; restore</button>' +
      '</div>' +
  
      '</div>';
  
    document.getElementById('settingsContent').innerHTML = html;
  }
  
  function pauseApp() {
    state.paused = true;
    state.pausedAt = Date.now();
    saveNow();
    render();
    showToast('Paused — enjoy your time away!');
  }

  function resumeApp() {
    if (!state.paused) return;
    const pausedAt = state.pausedAt || Date.now();
    const delta = Date.now() - pausedAt;
    // Shift pre-pause completions forward by the pause duration so nothing
    // aged while away. Completions logged during the pause stay as-is.
    Object.keys(state.completions).forEach(id => {
      const ts = state.completions[id];
      if (ts && ts <= pausedAt) state.completions[id] = Math.min(ts + delta, Date.now());
    });
    state.paused = false;
    state.pausedAt = null;
    state.hand = null;
    state.handDate = null;
    saveNow();
    render();
    showToast('Welcome home! Due dates shifted by ' + Math.max(1, Math.round(delta / 86400000)) + 'd');
  }

  function downloadBackup(auto) {
    const json = JSON.stringify(state);
    const blob = new Blob([json], { type: 'application/json' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = 'hometasks-backup-' + todayStr() + '.json';
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    setTimeout(() => URL.revokeObjectURL(url), 5000);
    state.lastBackupDate = todayStr();
    saveState();
    showToast(auto ? 'Weekly backup saved to Downloads' : 'Backup downloaded');
    if (currentTab === 'settings') renderSettings();
  }

  function autoBackupCheck() {
    const last = state.lastBackupDate;
    if (last) {
      const days = (new Date(todayStr() + 'T00:00:00') - new Date(last + 'T00:00:00')) / 86400000;
      if (days < 7) return;
    }
    downloadBackup(true);
  }

  function exportData() {
    const json = JSON.stringify(state);
    const ta = document.getElementById('exportTextarea');
    if (ta) {
      ta.value = json;
      ta.style.display = 'block';
      ta.focus();
      ta.setSelectionRange(0, json.length);
    }
    if (navigator.clipboard && navigator.clipboard.writeText) {
      navigator.clipboard.writeText(json)
        .then(() => showToast('Copied to clipboard!'))
        .catch(() => showToast('Tap the text box, then select all & copy'));
    } else {
      showToast('Tap the text box, then select all & copy');
    }
  }
  
  function importData() {
    const ta = document.getElementById('importTextarea');
    if (!ta || !ta.value.trim()) { showToast('Paste your exported data first'); return; }
    let parsed;
    try {
      parsed = JSON.parse(ta.value.trim());
      if (!parsed.completions) throw new Error('missing completions');
    } catch(e) {
      showToast('Invalid data — check and try again'); return;
    }
    if (!confirm('Replace all current data with the imported data?')) return;
    state = {
      completions:   parsed.completions   || {},
      budgetWeekday: parsed.budgetWeekday != null ? parsed.budgetWeekday : 45,
      budgetWeekend: parsed.budgetWeekend != null ? parsed.budgetWeekend : 90,
      zone:          parsed.zone          != null ? parsed.zone          : 0,
      hand:          parsed.hand          || null,
      handDate:      parsed.handDate      || null,
      customTasks:   parsed.customTasks   || {},
      deletedIds:    parsed.deletedIds    || [],
      pinnedIds:     parsed.pinnedIds     || [],
      starvation:    parsed.starvation    || {},
      starvationDate: parsed.starvationDate || null,
      guestHand:     parsed.guestHand     || null,
      resetHand:     parsed.resetHand     || null,
      goingOutHand:  parsed.goingOutHand  || null,
      snoozed:       parsed.snoozed       || {},
      flaggedIds:    parsed.flaggedIds    || [],
      completionHistory: parsed.completionHistory || {},
      presetHands:   parsed.presetHands   || {},
      mode: (parsed.mode === 'survival' ? 'maintenance' : parsed.mode) || 'maintenance',
      tierCLastDate: parsed.tierCLastDate || null,
      lastBackupDate: parsed.lastBackupDate || null,
      zoneMode: parsed.zoneMode || 'auto',
      paused: !!parsed.paused,
      pausedAt: parsed.pausedAt || null,
      taskMonths: parsed.taskMonths || {},
      seasonalDefaultsApplied: !!parsed.seasonalDefaultsApplied,
      actualTimes: parsed.actualTimes || {},
      inProgress: parsed.inProgress || {},
    };
    ta.value = '';
    saveState();
    render();
    showToast('Data restored!');
  }
  
  function adjustBudget(type, delta) {
    if (type === 'weekday') {
      state.budgetWeekday = Math.max(5, state.budgetWeekday + delta);
      const el = document.getElementById('budgetWeekdayVal');
      if (el) el.textContent = state.budgetWeekday;
    } else {
      state.budgetWeekend = Math.max(5, state.budgetWeekend + delta);
      const el = document.getElementById('budgetWeekendVal');
      if (el) el.textContent = state.budgetWeekend;
    }
    state.hand = null;
    saveState();
  }
  
  // ─── MANAGE TAB ────────────────────────────────────────────────────────────
  
  let manageOwnerFilter = 'all';
  let manageRoomFilter = 'all';
  let manageSearch = '';
  let editingId = null;
  let sprintHideCompleted = false;
  
  function renderManage() {
    const searchWasFocused = document.activeElement && document.activeElement.classList.contains('search-input');
    const allTasks = getAllTasks();
    const rooms = [...new Set(allTasks.map(t => t.room))].sort();
  
    const roomOpts = rooms.map(r =>
      '<option value="' + r + '"' + (manageRoomFilter === r ? ' selected' : '') + '>' + r + '</option>'
    ).join('');
  
    let html =
      '<div class="manage-header">' +
        '<div class="manage-header-left">' +
          '<div class="manage-title">All Tasks</div>' +
          '<div class="manage-subtitle">' + allTasks.length + ' tasks · sorted by frequency</div>' +
        '</div>' +
        '<button class="add-btn" onclick="openModal(null)">+ Add</button>' +
      '</div>' +
      '<div class="manage-toolbar">' +
        '<input class="search-input" placeholder="🔍 Search..." value="' + manageSearch.replace(/"/g,'&quot;') + '" oninput="manageSearch=this.value;renderManage()">' +
        '<select class="filter-select" onchange="manageOwnerFilter=this.value;renderManage()">' +
          '<option value="all"' + (manageOwnerFilter==='all'?' selected':'') + '>All</option>' +
          '<option value="alina"' + (manageOwnerFilter==='alina'?' selected':'') + '>Alina</option>' +
          '<option value="bob"' + (manageOwnerFilter==='bob'?' selected':'') + '>Bob</option>' +
          '<option value="either"' + (manageOwnerFilter==='either'?' selected':'') + '>Either</option>' +
        '</select>' +
        '<select class="filter-select" onchange="manageRoomFilter=this.value;renderManage()">' +
          '<option value="all"' + (manageRoomFilter==='all'?' selected':'') + '>All rooms</option>' +
          roomOpts +
        '</select>' +
      '</div>' +
      '<div class="manage-list">';
  
    const search = manageSearch.toLowerCase();
    const filtered = allTasks.filter(t => {
      if (t.oneOff) return false;
      if (manageOwnerFilter !== 'all' && t.owner !== manageOwnerFilter) return false;
      if (manageRoomFilter !== 'all' && t.room !== manageRoomFilter) return false;
      if (search && !t.name.toLowerCase().includes(search)) return false;
      return true;
    }).sort((a,b) => a.freq - b.freq || a.name.localeCompare(b.name));
  
    filtered.forEach(t => {
      const isCustom = !!(state.customTasks && state.customTasks[t.id]);
      const ownerLabel = t.owner === 'alina' ? 'Alina' : t.owner === 'bob' ? 'Bob' : 'Either';
      const overdue = daysOverdue(t);
      const statusHtml = !inSeason(t)
        ? '<span class="status-ok">&#10052; off-season</span>'
        : overdue >= 0
        ? '<span class="status-due">Due</span>'
        : '<span class="status-ok">in ' + Math.ceil(-overdue) + 'd</span>';
      const isDoneToday = wasCompletedToday(t);
      const last = state.completions[t.id] || 0;
      const lastDate = last ? new Date(last).toLocaleDateString('en-US', {month:'short', day:'numeric'}) : 'never';
      const mdpId = 'mdp_' + t.id;
      const inHand = !!(state.hand && state.hand.includes(t.id));
      const isFlagged = (state.flaggedIds || []).includes(t.id);
      const cad = cadenceInfo(t);
      const avgHint = cad !== null
        ? ' · <span style="color:' + cad.color + '">~' + cad.real + 'd real</span>'
        : '';
      const samples = (state.actualTimes || {})[t.id] || [];
      const learned = taskTime(t);
      const timeHint = samples.length >= 3 && learned !== t.time
        ? ' · <span style="color:var(--blue)">~' + learned + 'm (est ' + t.time + 'm, n=' + samples.length + ')</span>'
        : '';
      html +=
        '<div class="manage-card' + (isDoneToday ? ' mc-done' : '') + '">' +
          '<div class="manage-card-main">' +
            '<button class="mc-check" onclick="' + (isDoneToday ? 'uncompleteTask' : 'completeTask') + '(\'' + t.id + '\')">' +
              '<div class="mc-check-inner"></div>' +
            '</button>' +
            '<div class="manage-card-body">' +
              '<div class="manage-card-name">' + t.name + (isCustom ? ' <span style="font-size:11px;color:var(--blue)">custom</span>' : '') + '</div>' +
              '<div class="manage-card-meta">' + t.room + ' · ' + freqLabel(t.freq) + avgHint + timeHint + ' · ' + ownerLabel + ' · ' + statusHtml + '</div>' +
            '</div>' +
            '<div class="manage-card-icons">' +
              '<button class="icon-btn" onclick="openTimeModal(\'' + t.id + '\',\'\')" title="Log time manually">&#9201;</button>' +
              '<button class="icon-btn" onclick="openModal(\'' + t.id + '\')" title="Edit">&#9998;</button>' +
              '<button class="icon-btn" onclick="' + (isFlagged ? 'unflag' : 'flag') + 'Task(\'' + t.id + '\')" title="' + (isFlagged ? 'Unflag' : 'Flag') + '" style="' + (isFlagged ? '' : 'opacity:0.4') + '">🚩</button>' +
              '<button class="icon-btn danger" onclick="deleteTask(\'' + t.id + '\')" title="Delete">&#10005;</button>' +
            '</div>' +
          '</div>' +
          '<div class="manage-card-foot">' +
            '<span class="manage-card-last">Last: ' + lastDate + ' <button class="edit-btn" onclick="toggleManageDp(\'' + mdpId + '\')">edit</button></span>' +
            '<button class="manage-hand-btn' + (inHand ? ' in-hand' : '') + '" onclick="' + (inHand ? 'removeFromHand' : 'addToHand') + '(\'' + t.id + '\')">' + (inHand ? '✓ In hand' : '+ Today') + '</button>' +
          '</div>' +
          '<div class="manage-dp-row" id="' + mdpId + '">' +
            '<input type="date" class="date-input" id="minput_' + t.id + '" value="' + (last ? new Date(last).toISOString().slice(0,10) : '') + '">' +
            '<button class="date-save-btn" onclick="saveManageDate(\'' + t.id + '\')">Save</button>' +
          '</div>' +
        '</div>';
    });
  
    html += '</div><div class="bottom-pad"></div>';
    document.getElementById('manageTaskList').innerHTML = html;
    if (manageSearch && searchWasFocused) {
      const inp = document.getElementById('manageTaskList').querySelector('.search-input');
      if (inp) { inp.focus(); inp.setSelectionRange(inp.value.length, inp.value.length); }
    }
  }
  
  function getAllTasks() {
    const deleted = state.deletedIds || [];
    const custom = Object.values(state.customTasks || {});
    return [...TASKS.filter(t => !deleted.includes(t.id)), ...custom];
  }
  
  let editingMonths = new Set();

  function renderMonthChips() {
    const el = document.getElementById('monthChips');
    if (!el) return;
    const labels = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
    el.innerHTML = labels.map((lab, i) => {
      const m = i + 1;
      const on = editingMonths.has(m);
      return '<button type="button" onclick="toggleMonthChip(' + m + ')" style="padding:5px 8px;font-size:12px;border-radius:8px;cursor:pointer;border:1px solid ' + (on ? 'var(--green)' : 'var(--border2)') + ';background:' + (on ? 'var(--green)' : 'var(--bg2)') + ';color:' + (on ? '#fff' : 'var(--text2)') + '">' + lab + '</button>';
    }).join('');
  }

  function toggleMonthChip(m) {
    if (editingMonths.has(m)) editingMonths.delete(m);
    else editingMonths.add(m);
    renderMonthChips();
  }

  function openModal(id) {
    editingId = id;
    const modal = document.getElementById('taskModal');
    document.getElementById('modalTitle').textContent = id ? 'Edit task' : 'Add task';

    editingMonths = new Set(id ? ((state.taskMonths || {})[id] || []) : []);
    renderMonthChips();

    if (id) {
      const task = getAllTasks().find(t => t.id === id);
      if (!task) return;
      document.getElementById('f_name').value = task.name;
      document.getElementById('f_room').value = task.room;
      document.getElementById('f_freq').value = task.freq;
      document.getElementById('f_time').value = task.time;
      document.getElementById('f_owner').value = task.owner;
      document.getElementById('f_cat').checked = !!task.cat;
    } else {
      document.getElementById('f_name').value = '';
      document.getElementById('f_room').value = '';
      document.getElementById('f_freq').value = '';
      document.getElementById('f_time').value = '';
      document.getElementById('f_owner').value = 'either';
      document.getElementById('f_cat').checked = false;
    }
    modal.classList.add('open');
  }
  
  function closeModal() {
    document.getElementById('taskModal').classList.remove('open');
    editingId = null;
  }

  function openOneOffModal() {
    document.getElementById('oneoffName').value = '';
    document.getElementById('oneoffTime').value = '';
    document.getElementById('oneoffModal').classList.add('open');
    setTimeout(() => document.getElementById('oneoffName').focus(), 50);
  }

  function closeOneOffModal() {
    document.getElementById('oneoffModal').classList.remove('open');
  }

  function saveOneOff() {
    const name = document.getElementById('oneoffName').value.trim();
    const time = parseInt(document.getElementById('oneoffTime').value);
    if (!name || !time) { showToast('Enter a name and time'); return; }

    const id = 'oneoff_' + Date.now();
    if (!state.customTasks) state.customTasks = {};
    state.customTasks[id] = { id, name, room: '', freq: 1, time, owner: 'either', cat: false, oneOff: true };
    state.completions[id] = 0;
    if (!state.pinnedIds) state.pinnedIds = [];
    state.pinnedIds.push(id);
    dealHand();
    if (!state.hand.includes(id)) state.hand.push(id);
    saveNow();
    closeOneOffModal();
    render();
    showToast('Added to today\'s hand');
  }
  
  function saveTask() {
    const name = document.getElementById('f_name').value.trim();
    const room = document.getElementById('f_room').value.trim();
    const freq = parseInt(document.getElementById('f_freq').value);
    const time = parseInt(document.getElementById('f_time').value);
    const owner = document.getElementById('f_owner').value;
    const cat = document.getElementById('f_cat').checked;
  
    if (!name || !room || !freq || !time) { showToast('Fill in all fields'); return; }
  
    if (!state.customTasks) state.customTasks = {};
    if (!state.deletedIds) state.deletedIds = [];
  
    if (!state.taskMonths) state.taskMonths = {};
    const months = [...editingMonths].sort((a,b) => a - b);

    if (editingId) {
      const isBase = TASKS.find(t => t.id === editingId);
      if (isBase) state.deletedIds = [...new Set([...state.deletedIds, editingId])];
      state.customTasks[editingId] = { id: editingId, name, room, freq, time, owner, cat };
      if (months.length && months.length < 12) state.taskMonths[editingId] = months;
      else delete state.taskMonths[editingId];
    } else {
      const newId = 'custom_' + Date.now();
      state.customTasks[newId] = { id: newId, name, room, freq, time, owner, cat };
      state.completions[newId] = Date.now() - freq * 86400000;
      if (months.length && months.length < 12) state.taskMonths[newId] = months;
    }
  
    state.hand = null;
    saveState();
    closeModal();
    renderManage();
    showToast(editingId ? 'Task updated' : 'Task added');
  }
  
  function deleteTask(id) {
    if (!confirm('Delete this task?')) return;
    if (!state.deletedIds) state.deletedIds = [];
    if (!state.customTasks) state.customTasks = {};
    if (state.customTasks[id]) {
      delete state.customTasks[id];
    } else {
      state.deletedIds = [...new Set([...state.deletedIds, id])];
    }
    state.hand = null;
    saveState();
    renderManage();
    showToast('Task deleted');
  }
  
  
  
  function addToHand(id) {
    if (!state.hand) dealHand();
    if (!state.hand.includes(id)) {
      state.hand.push(id);
      saveState();
      render();
      showToast('Added to today\'s hand');
    }
  }
  
  // removeFromHand is defined earlier near swapTask — this duplicate is removed
  
  function toggleManageDp(dpId) {
    const row = document.getElementById(dpId);
    if (!row) return;
    const isOpen = row.classList.contains('open');
    document.querySelectorAll('.manage-dp-row.open').forEach(r => {
      const taskId = r.id.replace(/^mdp_/, '');
      saveManageDate(taskId);
      r.classList.remove('open');
    });
    if (!isOpen) row.classList.add('open');
  }
  
  function saveManageDate(taskId) {
    const input = document.getElementById('minput_' + taskId);
    if (!input) return;
    setLastDone(taskId, input.value);
  }
  
  function saveZone() {
    const v = document.getElementById('zoneSelect').value;
    if (v === 'auto') {
      state.zoneMode = 'auto';
    } else {
      state.zoneMode = 'manual';
      state.zone = parseInt(v);
    }
    state.hand = null;
    saveState();
    render();
  }
  
  function toggleOverflow() {
    overflowOpen = !overflowOpen;
    const list = document.getElementById('overflowList');
    const btn = document.getElementById('overflowToggle');
    if (!list || !btn) return;
    list.style.display = overflowOpen ? 'block' : 'none';
    btn.classList.toggle('open', overflowOpen);
  }
  
  function toggleDailies() {
    dailiesOpen = !dailiesOpen;
    renderAlina();
  }

  function toggleOtherTasks() {
    otherTasksOpen = !otherTasksOpen;
    renderAlina();
  }

  function toggleCompleted() {
    completedOpen = !completedOpen;
    renderAlina();
  }

  function toggleSprintCompleted() {
    sprintHideCompleted = !sprintHideCompleted;
    renderSprint();
  }
  
  function toggleDatePicker(dpId) {
    const row = document.getElementById(dpId);
    if (!row) return;
    const isOpen = row.classList.contains('open');
    document.querySelectorAll('.date-picker-row.open').forEach(r => {
      const taskId = r.id.replace(/^dp_/, '');
      saveDate(taskId);
      r.classList.remove('open');
    });
    document.querySelectorAll('.snooze-picker-row.open').forEach(r => r.classList.remove('open'));
    if (!isOpen) row.classList.add('open');
  }
  
  function toggleSnoozePicker(spId) {
    const row = document.getElementById(spId);
    if (!row) return;
    const isOpen = row.classList.contains('open');
    document.querySelectorAll('.snooze-picker-row.open, .date-picker-row.open').forEach(r => r.classList.remove('open'));
    if (!isOpen) row.classList.add('open');
  }
  
  function snoozeTask(id, days) {
    state.snoozed = state.snoozed || {};
    state.snoozed[id] = Date.now() + days * 86400000;
    state.hand = (state.hand || []).filter(h => h !== id);
    if (state.pinnedIds) state.pinnedIds = state.pinnedIds.filter(p => p !== id);
    if (state.inProgress) delete state.inProgress[id];
    saveState();
    render();
    showToast('Snoozed ' + days + 'd');
  }
  
  function saveDate(taskId) {
    const input = document.getElementById('input_' + taskId);
    if (!input) return;
    setLastDone(taskId, input.value);
  }
  
  let toastTimer;
  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.remove('undoable');
    t.classList.add('show');
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => t.classList.remove('show'), 1800);
  }

  function showUndoToast(id) {
    const t = document.getElementById('toast');
    t.innerHTML = 'Done! <button class="toast-undo-btn" onclick="undoComplete()">Undo</button>';
    t.classList.add('show', 'undoable');
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => t.classList.remove('show', 'undoable'), 5000);
  }
  
  // ─── ASYNC INIT ────────────────────────────────────────────────────────────
  async function init() {
    const now = new Date();
    const dateStr = now.toLocaleDateString('en-US', {weekday:'long', month:'long', day:'numeric'});
    const heroDateEl = document.getElementById('heroDate');
    if (heroDateEl) heroDateEl.textContent = dateStr;
  
    // Load state from persistent storage
    state = await loadState();

    // One-time seasonal defaults; user edits in Manage win from then on
    if (!state.seasonalDefaultsApplied) {
      if (!state.taskMonths) state.taskMonths = {};
      Object.entries(DEFAULT_MONTHS).forEach(([id, months]) => {
        if (!(id in state.taskMonths)) state.taskMonths[id] = [...months];
      });
      state.seasonalDefaultsApplied = true;
      saveState();
    }
  
    // Apply loaded settings to UI
    const zoneEl = document.getElementById('zoneSelect');
    if (zoneEl) zoneEl.value = (state.zoneMode || 'auto') === 'auto' ? 'auto' : String(state.zone);

    render();
    autoBackupCheck();
  }
  
  init();
  </script>
  </body>
  </html>
